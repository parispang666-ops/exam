<!DOCTYPE html>
<!-- 整体PRD参考：prd/考试功能-整体PRD.md -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>考试记录-下级单位 - 环慧慧 EHS+</title>
  <style>
    :root {
      --color-brand: #1570EF;
      --color-brand-hover: #2E90FA;
      --color-brand-active: #175CD3;
      --color-text-primary: #444F66;
      --color-text-secondary: #758095;
      --color-text-placeholder: #9EA4AE;
      --color-bg-page: #F7F8FA;
      --color-border: #DEDFE3;
      --color-divider: #E6E7EB;
      --color-topbar-bg: #00254A;
      --color-topbar-text: rgba(255,255,255,0.90);
      --color-topbar-sub: rgba(255,255,255,0.60);
      --color-sidebar-bg: #00254A;
      --color-sidebar-item-bg: #042240;
      --color-sidebar-active: #007AFF;
      --sidebar-width-new: 256px;
      --font-family-ui: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      font-family: var(--font-family-ui);
      font-size: 14px;
      line-height: 22px;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    img {
      display: block;
      object-fit: contain;
    }

    .app {
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg-page);
    }

    /* ==================== 顶部导航栏：沿用练习列表 ==================== */
    .menu-topbar { position: fixed; z-index: 30; top: 0; left: 0; width: 100%; height: 64px; display: flex; background: var(--color-topbar-bg); overflow: hidden; }
    .menu-logo { width: var(--sidebar-width-new); height: 64px; position: relative; display: flex; align-items: center; background: var(--color-topbar-bg); overflow: hidden; flex: 0 0 var(--sidebar-width-new); }
    .menu-logo::before { content:""; position:absolute; width:236px; height:236px; left:10px; top:-33px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.40) inset; border-radius:9999px; }
    .menu-logo::after { content:""; position:absolute; width:188px; height:188px; left:34px; top:-9px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.30) inset; border-radius:9999px; }
    .menu-logo-inner { position:absolute; width:138px; height:138px; left:59px; top:16px; background:#002449; box-shadow:0px 4px 10px rgba(0,0,0,0.20) inset; border-radius:9999px; z-index:0; }
    .menu-logo-icon { position:absolute; left:28px; top:8px; width:48px; height:48px; z-index:1; }
    .menu-logo-icon img { width:48px; height:48px; }
    .menu-logo-main { position:absolute; left:88px; top:16px; z-index:1; font-size:20px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-text); white-space:nowrap; }
    .menu-logo-brand { color:rgba(58,184,255,0.90); }
    .menu-logo-sub { position:absolute; left:87px; top:39px; z-index:1; font-size:12px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-sub); white-space:nowrap; }
    .menu-logo-sep { position:absolute; left:148px; top:27px; width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.30); }
    .menu-top-nav { flex:1; min-width:0; height:64px; display:flex; align-items:center; background:var(--color-topbar-bg); }
    .menu-top-track { height:64px; display:flex; align-items:center; gap:32px; padding:0 16px; }
    .menu-top-item { height:46px; display:inline-flex; align-items:center; padding:0; border:none; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; }
    .menu-top-item.is-active { border-bottom-color:var(--color-sidebar-active); }
    .menu-top-actions { height:64px; display:flex; align-items:center; padding:0 16px 0 12px; color:var(--color-topbar-text); font-size:12px; font-family:var(--font-family-ui); white-space:nowrap; flex-shrink:0; }
    .menu-user { display:inline-flex; align-items:center; color:var(--color-topbar-text); font-size:12px; white-space:nowrap; }
    .menu-user-meta { height:24px; display:inline-flex; align-items:center; }

    /* ==================== 侧边导航菜单：沿用练习列表 ==================== */
    .menu-shell { position:fixed; z-index:20; top:64px; left:0; width:var(--sidebar-width-new); height:calc(100vh - 64px); display:flex; flex-direction:column; justify-content:flex-start; background:var(--color-sidebar-bg); box-shadow:0px 2px 8px rgba(0,0,0,0.25); }
    .menu-side-list { display:flex; flex-direction:column; margin:0; padding:0; overflow:hidden auto; scrollbar-width:thin; }
    .menu-side-list::-webkit-scrollbar { width:3px; }
    .menu-side-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:50px; }
    .menu-side-item { width:256px; height:52px; display:flex; align-items:center; gap:12px; padding:0 8px 0 24px; border:none; border-radius:0; background:var(--color-sidebar-bg); color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; }
    .menu-side-item:hover { background:rgba(255,255,255,0.06); }
    .menu-side-item img { width:20px; height:20px; flex:0 0 auto; }
    .menu-side-item .menu-side-arrow { width:16px; height:16px; flex:0 0 auto; margin-left:auto; margin-right:12px; transition:transform 200ms ease; }
    .menu-side-item .menu-side-arrow img { width:16px; height:16px; }
    .menu-side-item.is-expanded { background:rgba(255,255,255,0.08); }
    .menu-side-item.is-expanded .menu-side-arrow { transform:rotate(90deg); }
    .menu-side-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .menu-sublist { display:none; flex-direction:column; margin:0; padding:0; background:var(--color-sidebar-item-bg); }
    .menu-sublist.is-open { display:flex; }
    .menu-side-child { width:240px; height:36px; display:flex; align-items:center; margin:8px; padding:0 0 0 36px; border:none; border-radius:4px; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; white-space:nowrap; position:relative; }
    .menu-side-child::before { content:""; position:absolute; left:16px; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.40); }
    .menu-side-child:hover { background:rgba(255,255,255,0.08); }
    .menu-side-child.is-active { background:var(--color-sidebar-active); color:white; }
    .menu-side-child.is-active::before { background:white; }

    .main-content-area {
      min-width: 0;
      height: 100vh;
      margin-left: var(--sidebar-width-new);
      padding: 64px 0 0;
      overflow: hidden;
      background: #F7F8FA;
    }

    .record-workspace {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      background: #fff;
    }

    .record-tabs {
      height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex: 0 0 40px;
      padding: 0 12px;
      border-bottom: 1px solid #E6E7EB;
      background: #fff;
      overflow: hidden;
    }

    .record-tab {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: #65758B;
      font-size: 14px;
      white-space: nowrap;
    }

    .record-tab.is-active {
      background: #EAF5FF;
      color: #1677FF;
      font-weight: 500;
    }

    .record-tab-close {
      margin-left: 4px;
      font-size: 13px;
      color: #1677FF;
    }

    .filter-bar {
      min-height: 58px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 auto;
      padding: 14px 26px 10px;
      border-bottom: 1px solid #E6E7EB;
      background: #fff;
    }

    .filter-main-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
    }

    .filter-fields {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .filter-extra-row {
      display: none;
      align-items: center;
      gap: 20px;
      min-width: 0;
      padding-left: 0;
    }

    .filter-bar.is-expanded .filter-extra-row { display: flex; }

    .filter-item {
      display: flex;
      align-items: center;
      min-width: 0;
      height: 32px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
    }

    .filter-label {
      width: 84px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-right: 1px solid #E2E6ED;
      color: #4B5565;
      font-size: 13px;
      white-space: nowrap;
      background: #fff;
    }

    .filter-input,
    .filter-select {
      width: 178px;
      height: 30px;
      padding: 0 10px;
      border: 0;
      outline: 0;
      color: #3F4756;
      font-size: 13px;
      background: #fff;
    }

    .filter-input::placeholder { color: #A3ADBA; }
    .filter-select { color: #A3ADBA; appearance: none; }
    .filter-date { width: 220px; }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .btn {
      height: 32px;
      min-width: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 14px;
      border-radius: 4px;
      font-size: 13px;
      background: #fff;
    }

    .btn-primary {
      border: 1px solid #1677FF;
      color: #1677FF;
    }

    .btn-neutral {
      border: 1px solid #B8C0CC;
      color: #4B5565;
    }

    .btn-text {
      min-width: auto;
      padding: 0 2px;
      color: #1677FF;
      background: transparent;
    }

    .btn-text .toggle-arrow {
      display: inline-block;
      transition: transform 150ms ease;
    }

    .filter-bar.is-expanded .btn-text .toggle-arrow {
      transform: rotate(180deg);
    }

    .table-toolbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 0 0 auto;
      padding: 5px 26px 4px;
      background: #fff;
    }

    .export-btn {
      height: 30px;
      min-width: 78px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 4px;
      background: #1F72F2;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
    }

    .update-tip {
      color: #FF0000;
      font-size: 13px;
      white-space: nowrap;
    }

    .table-shell {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      margin: 0 26px;
      background: #fff;
      scrollbar-color: #B7BEC9 #F0F1F3;
      scrollbar-width: auto;
    }

    .table-shell::-webkit-scrollbar { width: 10px; height: 10px; }
    .table-shell::-webkit-scrollbar-track { background: #F0F1F3; border-radius: 999px; }
    .table-shell::-webkit-scrollbar-thumb { background: #B7BEC9; border-radius: 999px; }

    .record-table {
      width: 1572px;
      border-collapse: collapse;
      table-layout: fixed;
      color: #333B49;
      font-size: 13px;
    }

    .record-table th {
      height: 42px;
      padding: 0 8px;
      color: #243044;
      font-weight: 500;
      text-align: left;
      white-space: nowrap;
      background: #fff;
    }

    .record-table td {
      height: 43px;
      padding: 0 8px;
      color: #3E4652;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #fff;
    }

    .record-table tbody tr:hover td { background: #F8FBFF; }
    .record-table .muted { color: #6B7280; }
    .record-table .center { text-align: center; }

    .table-action-btn {
      height: 28px;
      padding: 0;
      color: #1677FF;
      background: transparent;
      font-size: 13px;
      white-space: nowrap;
    }

    .table-action-btn:hover { color: #175CD3; }

    .reference-mask {
      position: fixed;
      z-index: 80;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 25, 40, 0.18);
    }

    .reference-mask.is-open { display: flex; }

    .reference-dialog {
      width: min(1180px, calc(100vw - 48px));
      height: min(640px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #AEB8C6;
      background: #fff;
      box-shadow: 0 16px 36px rgba(20, 33, 61, 0.18);
    }

    .reference-header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 52px;
      padding: 0 20px 0 16px;
      border-bottom: 1px solid #AEB8C6;
      color: #344054;
      font-size: 14px;
      font-weight: 600;
      background: #fff;
    }

    .reference-close {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #667085;
      background: transparent;
      font-size: 18px;
      line-height: 1;
    }

    .reference-close:hover { background: #F2F4F7; color: #344054; }

    .reference-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 28px 32px 0;
      background: #fff;
    }

    .reference-table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }

    .reference-table {
      width: 100%;
      min-width: 1020px;
      border-collapse: collapse;
      table-layout: fixed;
      color: #344054;
      font-size: 14px;
    }

    .reference-table th,
    .reference-table td {
      height: 45px;
      padding: 0 12px;
      border-bottom: 1px solid #DDD9EF;
      background: #F3F0FF;
      text-align: left;
      white-space: nowrap;
    }

    .reference-table th {
      color: #344054;
      font-weight: 600;
    }

    .reference-table td { font-weight: 400; }

    .reference-link {
      padding: 0;
      color: #1677FF;
      background: transparent;
      font-size: 14px;
    }

    .reference-footer {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 72px;
      gap: 20px;
      color: #344054;
      font-size: 13px;
    }

    .reference-page-size {
      width: 112px;
      height: 32px;
      margin-left: 12px;
      padding: 0 10px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      color: #344054;
      background: #fff;
      outline: 0;
    }

    .reference-pager {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .reference-page-btn {
      min-width: 31px;
      height: 31px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 9px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      color: #344054;
      background: #fff;
      font-size: 13px;
    }

    .reference-page-btn.is-active {
      border-color: #1F72F2;
      color: #fff;
      background: #1F72F2;
    }

    .reference-page-ellipsis {
      width: 18px;
      text-align: center;
      color: #667085;
    }

    .reference-jump-input {
      width: 40px;
      height: 31px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      color: #344054;
      text-align: center;
      outline: 0;
    }

    .footer-bar {
      height: 88px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex: 0 0 88px;
      padding: 0 26px 16px;
      background: #fff;
    }

    .total-wrap {
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      color: #44516A;
      font-size: 13px;
    }

    .total-line {
      width: 302px;
      height: 3px;
      background: #E0E3EA;
      border-radius: 999px;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #44516A;
      font-size: 13px;
      white-space: nowrap;
    }

    .page-size {
      width: 100px;
      height: 30px;
      padding: 0 10px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      background: #fff;
      color: #44516A;
      font-size: 13px;
    }

    .page-btn {
      min-width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      color: #44516A;
      background: #fff;
      font-size: 13px;
    }

    .page-btn.is-active {
      border-color: #1F72F2;
      background: #1F72F2;
      color: #fff;
    }

    .page-ellipsis {
      width: 22px;
      text-align: center;
      color: #667085;
    }

    .jump-input {
      width: 52px;
      height: 30px;
      border: 1px solid #D8DDE6;
      border-radius: 4px;
      text-align: center;
      color: #44516A;
      outline: 0;
    }

    @media (max-width: 1180px) {
      .filter-main-row { align-items: flex-start; flex-direction: column; }
      .filter-fields { flex-wrap: wrap; gap: 12px; }
      .filter-extra-row { flex-wrap: wrap; gap: 12px; }
      .footer-bar { align-items: stretch; flex-direction: column; height: auto; padding-top: 12px; }
      .pagination { justify-content: flex-end; flex-wrap: wrap; }
      .reference-body { padding: 20px 18px 0; }
      .reference-footer { align-items: flex-start; flex-direction: column; height: auto; padding: 12px 0; }
      .reference-pager { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="menu-topbar" aria-label="顶部导航">
      <div class="menu-logo">
        <div class="menu-logo-inner"></div>
        <span class="menu-logo-icon"><img src="assets/CodeBuddyAssets/696_1660/14.svg" alt=""></span>
        <span class="menu-logo-main">环慧慧<span class="menu-logo-brand">EHS+</span></span>
        <span class="menu-logo-sub">Enterprise&nbsp;Edition</span>
        <span class="menu-logo-sep"></span>
      </div>
      <nav class="menu-top-nav" aria-label="一级模块导航">
        <div class="menu-top-track">
          <button class="menu-top-item" type="button">环境</button>
          <button class="menu-top-item" type="button">安全</button>
          <button class="menu-top-item is-active" type="button">EHS教育</button>
          <button class="menu-top-item" type="button">系统管理</button>
          <button class="menu-top-item" type="button">外包管理</button>
        </div>
      </nav>
      <div class="menu-top-actions">
        <span class="menu-user"><span class="menu-user-meta">庞刚(系统管理员)</span></span>
      </div>
    </header>

    <aside class="menu-shell" aria-label="侧边导航菜单">
      <div class="menu-side-list">
        <button class="menu-side-item" type="button" onclick="toggleMenuSublist(this)">
          <img src="assets/CodeBuddyAssets/696_1660/1.svg" alt="">
          <span class="menu-side-label">学习中心</span>
          <span class="menu-side-arrow"><img src="assets/CodeBuddyAssets/696_1660/2.svg" alt=""></span>
        </button>
        <div class="menu-sublist">
          <button class="menu-side-child" type="button">课件管理</button>
          <button class="menu-side-child" type="button">课程管理</button>
          <button class="menu-side-child" type="button">学习记录</button>
        </div>

        <button class="menu-side-item" type="button" onclick="toggleMenuSublist(this)">
          <img src="assets/CodeBuddyAssets/696_1660/13.svg" alt="">
          <span class="menu-side-label">设置</span>
          <span class="menu-side-arrow"><img src="assets/CodeBuddyAssets/696_1660/12.svg" alt=""></span>
        </button>
        <div class="menu-sublist is-open">
          <button class="menu-side-child" type="button">课件类型管理</button>
          <button class="menu-side-child" type="button">练习列表</button>
        </div>

        <button class="menu-side-item is-expanded" type="button" onclick="toggleMenuSublist(this)">
          <img src="assets/CodeBuddyAssets/696_1660/1.svg" alt="">
          <span class="menu-side-label">统计报表</span>
          <span class="menu-side-arrow"><img src="assets/CodeBuddyAssets/696_1660/2.svg" alt=""></span>
        </button>
        <div class="menu-sublist is-open">
          <button class="menu-side-child is-active" type="button">考试记录</button>
        </div>

        <button class="menu-side-item" type="button" onclick="toggleMenuSublist(this)">

# 考试功能 — 整体 PRD

## 1. 引言

### 1.1 背景与目标

"考试功能"是 EHS+ 企业版中对员工进行安全生产知识评测的核心模块。该模块需要支持三种不同的租户形态：

- **集团（上级单位）**：跨多家子公司的人员管理形态，需要跨公司选择考试对象、查看跨公司统计数据。
- **下级单位**：处于集团层级下的成员单位，承接上级派发的考试，同时可创建本单位内部考试。
- **独立租户（普通租户/非集团）**：无上下级层级关系的独立组织，仅管理本租户范围内的考试。

本 PRD 从全局视角定义考试功能在上述三种租户形态下的统一业务规则、数据模型、角色权限和核心流程。各页面的详细交互规格请参见对应的页面 PRD。

### 1.2 用户价值

| 租户类型 | 核心价值 |
|----------|----------|
| 集团管理员 | 跨公司统一下发安全知识考试，掌握全集团各子公司的考试进展与成绩分布。 |
| 下级单位管理员 | 承接集团下发的考试任务，同时自主创建本单位专属考试来满足内部学习需求。 |
| 普通租户管理员 | 自主管理本组织的考试全生命周期，从创建、发布到统计分析形成完整闭环。 |

### 1.3 功能范围

**包含**：

| 模块 | 说明 |
|------|------|
| 考试列表 | 按租户类型展示对应的考试清单，支持新增、编辑、删除、复制、发布（草稿）、管理（统计入口） |
| 新增考试 | 三步创建考试：基本信息 → 考生范围（人员/部门选择 + 免考） → 考试设置 |
| 编辑考试 | 修改草稿考试的考生范围，覆盖人员快照 |
| 考试统计 | 考生分析、考试记录、部门统计三个维度，含人员状态筛选和部门统计在职过滤 |
| 人员选择 | 按租户数据范围选择考试对象（人员 + 部门） |
| 发布校验 | 草稿发布前对人员快照与当前人员主数据的差异进行校验与确认 |

**不包含**：

- 试题配置与管理（考试设置步骤中的具体试题选择不属于本次范围）
- 考生端的考试作答/提交/成绩查看
- 移动端管理能力

│  │ (上级单位)    │───▶│  (子公司/分公司)   │    │ (非集团组织)   │   │

### 2.1 核心差异对照表

| 上级下发考试 | ❌ 不涉及 | ✅ 考试列表展示上级下发 | ❌ 不涉及 |
| 上级下发考试操作 | — | 仅"管理" | — |
| 人员列表分组 | 按公司分组 | 不分组、平铺展示 | 不分组、平铺展示 |
| 考生分析/考试记录列表 | 含"所属公司"列 | 无"所属公司"列 | 无"所属公司"列 |
| 部门筛选方式 | 公司+部门级联 | 部门下拉树 | 部门下拉树 |
| 统计部门视图 | 部门明细 + 公司汇总 | 部门明细 | 部门明细 |
| 人员选择器页面 | 人员选择-集团 | 人员选择-下级单位 | 人员选择-下级单位 |

## 3. 角色与权限

| 角色 | 租户端 | 可创建考试 | 可选择的考试对象范围 | 可编辑考试 | 可查看统计 | 说明 |

| 集团管理员 | 集团 | ✅ | 集团全部公司的人员和部门 | ✅ 仅草稿 | ✅ 全集团 | 可跨公司管理考试全生命周期 |
| 下级单位管理员 | 下级单位 | ✅ 本单位考试 | 本单位 + 下属部门 | ✅ 仅自建草稿 | ✅ 本单位 | 可承接上级下发考试，对其进行管理操作 |
| 普通租户管理员 | 独立租户 | ✅ | 本租户全量人员 | ✅ 仅草稿 | ✅ 本租户 | 与下级单位类似，但无上下级关系 |

## 4. 名词解释

| 术语 | 定义 |
|------|------|
| **考试** | 一次完整的考试活动，包含基本信息、考生范围、考试设置、题目配置等。 |
| **考生范围** | 考试的目标对象集合，可通过选择人员（指定用户）或部门范围来定义。 |
| **指定用户** | 以单个人员为维度选定的考试对象。 |
| **部门范围** | 以部门为维度选定的考试对象，选择某部门即包含该部门下（可选含下级部门）的全体人员。 |
| **组织内全部人员** | 考试对象覆盖当前租户范围内的全部人员，无需单独选择。 |
| **仅部分人员** | 考试对象仅为管理员选择的具体人员或部门范围内的人员。 |
| **免考人员** | 被排除在考试要求之外的人员或部门，不计入应考人数，不影响参与率和及格率计算。 |
| **人员快照** | 创建考试或编辑保存时对当时考试对象范围内所有人员的完整记录（含 ID、姓名、所属公司、部门、人员状态），用于发布前人员变更校验。 |
| **人员状态** | 枚举值：在职（启用）、离职、停用（禁用）。 |
| **草稿** | 考试创建后尚未发布的初始状态，支持编辑和发布。 |
| **未开始** | 考试发布后但尚未到达考试开始时间的状态。 |
| **进行中** | 考试正处于考试时间段内的状态。 |
| **已结束** | 考试时间已过的状态。 |
| **上级下发考试** | 由集团或上级单位创建并推送给下级单位的考试，下级单位不可编辑、删除、发布。 |
| **自建考试** | 当前租户管理员自行创建的考试。 |
| **公司汇总** | 集团独有的统计视图，以公司为粒度对部门数据进行扁平汇总展示。 |
| **部门明细** | 以部门树结构展示统计数据的视图。 |

## 5. 核心业务流程图

### 5.1 考试全生命周期（通用）

```mermaid
flowchart TD
    A[创建考试] --> B[填写基本信息]
    B --> C[选择考生范围]
    C --> C1{考试对象模式?}
    C1 -->|仅部分人员| C2[选择人员/部门 + 配置免考]
    C1 -->|组织内全部人员| C3[跳过选人]
    C2 --> D[设置考试参数]
    C3 --> D
    D --> E[生成人员快照]
    E --> F{保存为草稿}
    F --> G[草稿状态]
    G --> H{管理员操作?}
    H -->|编辑| I[编辑考生范围 → 覆盖快照]
    I --> G
    H -->|发布| J[执行发布前人员变更校验]
    J --> K{有人员变更?}
    K -->|否| L[直接发布]
    K -->|是| M[展示发布弹窗]
    M --> N{管理员确认?}
    N -->|取消| G
    N -->|确认发布| L
    L --> O[未开始]
    O --> P[进行中]
    P --> Q[已结束]
    G -->|删除| R[考试删除]
```

### 5.2 下级单位特殊流程：上级下发考试

```mermaid
flowchart TD
    G[集团管理员] -->|创建并下发| S[上级下发考试]
    S -->|出现在| SU[下级单位考试列表]
    SU --> SU1{下级单位操作}
    SU1 -->|点击名称| SU2[查看集团版考试详情]
    SU1 -->|管理| SU3[进入本单位统计页]
    SU1 -->|编辑/删除/发布/复制| SU4[❌ 不可操作]
```

### 5.3 发布前人员变更校验流程

```mermaid
flowchart TD
    A[管理员点击发布] --> B[系统获取人员快照]
    B --> C[获取当前人员主数据]
    C --> D{比对快照与主数据}
    D --> E1[已选人员离职/停用 → 移除]
    D --> E2[部门内人员离职/停用/转出 → 移除]
    D --> E3[部门内人员转入/启用 → 新增]
    E1 --> F{总计变更 > 0 ?}
    E2 --> F
    E3 --> F
    F -->|否| G[直接发布，状态变更为未开始]
    F -->|是| H[展示发布弹窗]
    H --> I[按分类查看：全部 / 移除 / 新增]
    I --> J{管理员操作?}
    J -->|点击发布| G
    J -->|点击取消 / 关闭 / 遮罩| K[保持草稿，不发布]
```

## 7. 数据模型

### 7.1 核心实体关系图

```mermaid
erDiagram
    租户 ||--o{ 考试 : "拥有"
    考试 ||--o{ 人员快照 : "生成"
    考试 ||--o{ 考试记录 : "产生"
    考试 ||--o{ 免考配置 : "配置"
    考试 }o--|| 租户 : "归属"
    考试 }o--|| 考试分类 : "分类"

    租户 {
        string 租户ID PK
        string 租户名称
        string 租户类型 "集团 / 下级单位 / 普通租户"
        string 上级租户ID FK "下级单位时有值"
        string 所属公司名称 "集团/下级单位"
    }

    考试 {
        string 考试ID PK
        string 所属租户ID FK
        string 考试名称
        string 分类ID FK
        string 来源 "自建 / 上级下发"
        string 状态 "草稿 / 未开始 / 进行中 / 已结束"
        string 范围模式 "仅部分人员 / 组织内全部人员"
        datetime 考试开始时间
        datetime 考试结束时间
        datetime 快照生成时间
        datetime 创建时间
        datetime 更新时间
    }

    人员快照 {
        string 快照ID PK
        string 考试ID FK
        string 人员ID
        string 姓名
        string 所属公司 "集团有值，下级单位/普通租户无"
        string 部门名称
        string 部门全路径
        string 人员状态 "在职 / 离职 / 停用"
        datetime 快照时间
        string 快照版本 "创建 / 编辑"
    }

    免考配置 {
        string 免考配置ID PK
        string 考试ID FK
        string 免考类型 "人员 / 部门"
        string 免考目标ID
        string 免考目标名称
    }

    考试记录 {
        string 考试记录ID PK
        string 考试ID FK
        string 考生ID
        string 考生姓名
        string 所属公司
        string 部门名称
        string 完成状态 "已完成 / 未完成"
        int 分数
        bool 是否及格
        datetime 交卷时间
    }

    考试分类 {
        string 分类ID PK
        string 租户ID FK

        string 来源 "自建 / 上级下发（下级单位有上级下发分类节点）"
    }
```

### 7.2 关键字段说明

#### 考试来源

| 值 | 含义 | 适用租户 |
|----|------|---------|
| 自建 | 当前租户自建考试 | 全部 |
| 上级下发 | 上级下发考试 | 下级单位 |

#### 考试状态流转

```
草稿 → 未开始 → 进行中 → 已结束
  │
  └── (删除)
```

#### 人员快照版本

| 值 | 生成时机 | 说明 |
|----|---------|------|
| 创建 | 创建考试保存时 | 考试首次创建时生成 |
| 编辑 | 编辑考试保存时 | 覆盖旧快照，作为发布校验的最新基准 |

## 8. 非功能性需求

### 8.1 性能要求

| 指标 | 要求 |
|------|------|
| 考试列表查询响应 | ≤ 2s（1000 条以内） |
| 人员选择器加载 | ≤ 3s（10,000 以内人员数据） |
| 部门人数重新计算 | ≤ 3s |
| 发布前人员变更校验 | ≤ 5s（包含三分类校验） |
| 考试统计查询 | ≤ 3s |
| 并发支持 | 支持 100+ 管理员同时操作 |

### 8.2 安全性

| 要求 | 说明 |
|------|------|
| 数据隔离 | 不同租户数据严格隔离，下级单位不可访问集团或平级单位数据 |
| 操作权限 | 上级下发考试在下级单位侧仅开放"管理"操作，编辑/删除/发布等操作需校验考试来源为自建 |
| 人员选择范围限制 | 下级单位人员选择器限定本单位及下属部门，不可越权访问平级或上级单位人员 |
| 快照安全 | 人员快照为只读历史数据，持久化后不可篡改 |

### 8.3 兼容性

| 要求 | 说明 |
|------|------|
| 浏览器 | Chrome 90+、Edge 90+、Safari 14+ |
| 分辨率 | 1366×768 及以上 |

### 8.4 可维护性

| 要求 | 说明 |
|------|------|
| 操作日志 | 考试创建、编辑、发布、删除需记录操作日志 |
| 快照审计 | 快照生成和覆盖保留历史记录，发布校验时可回溯 |

<script>
(function(){
var md=document.getElementById('prdMarkdown');
var mdText=md?md.textContent:'';
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMarkdown(t){
  var lines=t.split('\n');
  var html='';
  var i=0;
  var inTable=0,tableHtml='';
  var inCode=0,codeHtml='',codeLang='';
  var inList=0,listHtml='',listType='';
  var asciiLines=[];
  function flushAscii(){if(asciiLines.length){html+='<pre>'+asciiLines.map(escapeHtml).join('\n')+'</pre>\n';asciiLines=[];}}
  function flushList(){if(inList){html+='<'+listType+'>\n'+listHtml+'</'+listType+'>\n';inList=0;listHtml='';}}
  function flushTable(){if(inTable){html+=tableHtml+'</tbody></table>\n';inTable=0;tableHtml='';}}
  function isAsciiLine(s){return /[└┬┐├┼┤└┴┘│─═▶■◆]/.test(s);}
  while(i<lines.length){
    var L=lines[i];
    var trimmed=L.trim();
    if(inCode){
      if(trimmed==='```'){html+='<pre><code'+(codeLang?' class="language-'+codeLang+'"':'')+'>'+escapeHtml(codeHtml.trimEnd())+'</code></pre>\n';inCode=0;codeHtml='';codeLang='';i++;continue;}
      codeHtml+=L+'\n';i++;continue;
    }
    if(trimmed.startsWith('```')){
      flushAscii();flushList();flushTable();
      codeLang=trimmed.slice(3).trim();codeHtml='';inCode=1;i++;continue;
    }
    if(isAsciiLine(L)&&!trimmed.startsWith('|')){
      flushList();flushTable();asciiLines.push(L);i++;continue;
    }
    if(asciiLines.length>0){flushAscii();}
    if(trimmed.startsWith('|')&&trimmed.endsWith('|')){
      flushList();
      if(!inTable){tableHtml='<table>';inTable=1;}
      var cells=trimmed.slice(1,-1).split('|').map(function(c){return c.trim();});
      if(cells.every(function(c){return /^[-: ]+$/.test(c);})){i++;continue;}
      tableHtml+='<tr>'+cells.map(function(c){return '<'+(inTable===1?'th':'td')+'>'+inlineMarkdown(c)+'</'+(inTable===1?'th':'td')+'>';}).join('')+'</tr>';
      if(inTable===1){tableHtml+='<tbody>';inTable=2;}
      i++;continue;
    }
    flushTable();flushList();
    if(/^#{1,4}\s/.test(trimmed)){
      var m1=trimmed.match(/^(#{1,4})\s+(.*)/);
      var lvl=m1[1].length;html+='<h'+(lvl+1)+'>'+inlineMarkdown(m1[2])+'</h'+(lvl+1)+'>\n';i++;continue;
    }
    if(/^[-*]\s/.test(trimmed)){
      if(!inList){listType='ul';inList=1;}
      listHtml+='<li>'+inlineMarkdown(trimmed.slice(2))+'</li>\n';i++;continue;
    }
    if(/^\d+\.\s/.test(trimmed)){
      if(!inList){listType='ol';inList=1;}
      listHtml+='<li>'+inlineMarkdown(trimmed.replace(/^\d+\.\s/,''))+'</li>\n';i++;continue;
    }
    if(trimmed==='---'||trimmed==='***'){html+='<hr>\n';i++;continue;}
    if(trimmed.startsWith('>')){
      var bq='';while(i<lines.length&&lines[i].trim().startsWith('>')){bq+=lines[i].trim().slice(1).trim()+' ';i++;}
      html+='<blockquote>'+inlineMarkdown(bq.trim())+'</blockquote>\n';continue;
    }
    if(trimmed===''){
      if(asciiLines.length>0)flushAscii();i++;continue;
    }
    html+='<p>'+inlineMarkdown(trimmed)+'</p>\n';i++;
  }
  flushAscii();flushList();flushTable();
  if(inCode)html+='<pre><code'+('>'+escapeHtml(codeHtml.trimEnd())+'</code></pre>\n');
  return html;
}
function inlineMarkdown(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
}
function openPrdModal(){
  var modal=document.getElementById('prdModal');
  var body=document.getElementById('prdModalBody');
  if(!body.innerHTML&&mdText){
    body.innerHTML=renderMarkdown(mdText);
  }else if(!body.innerHTML){
    body.innerHTML='<p style="text-align:center;color:#999;padding:60px 0;">无法加载整体PRD内容</p>';
  }
  modal.classList.add('show');
  document.body.style.overflow='hidden';
}
function closePrdModal(){
  document.getElementById('prdModal').classList.remove('show');
  document.body.style.overflow='';
}
window.togglePrdModal=function(){if(document.getElementById('prdModal').classList.contains('show')){closePrdModal();}else{openPrdModal();}};
window.openPrdModal=openPrdModal;
window.closePrdModal=closePrdModal;
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePrdModal();});
})();
</script>
