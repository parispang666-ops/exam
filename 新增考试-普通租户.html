<!DOCTYPE html>
<!-- 整体PRD参考：prd/考试功能-整体PRD.md -->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新增考试-普通租户 - 环慧慧 EHS+</title>
  <style>
    :root {
      --color-brand: #1570EF;
      --color-brand-hover: #2E90FA;
      --color-brand-active: #175CD3;
      --color-danger: #F64C41;
      --color-success: #00C5C3;
      --color-warning: #FF8340;
      --color-text-primary: #444F66;
      --color-text-secondary: #758095;
      --color-text-placeholder: #9EA4AE;
      --color-text-disabled: #B3B9C4;
      --color-bg-page: #F7F8FA;
      --color-bg-surface: #FFFFFF;
      --color-bg-muted: #F7F8F9;
      --color-brand-light: #EFF8FF;
      --color-border: #DEDFE3;
      --color-divider: #E6E7EB;
      --radius-component: 4px;
      --font-family-ui: "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      --shadow-topbar: 0 1px 4px rgba(31, 42, 55, .10);
      --shadow-brand: 0 1px 5px rgba(21,112,239,.05), 0 4px 2.5px rgba(21,112,239,.08), 0 2px 2px rgba(21,112,239,.25);
      --focus-ring: 0 0 0 2px #D9E1FF;
      --color-topbar-bg: #00254A; --color-topbar-text: rgba(255,255,255,0.90); --color-topbar-sub: rgba(255,255,255,0.60);
      --color-sidebar-bg: #00254A; --color-sidebar-item-bg: #042240; --color-sidebar-active: #007AFF;
      --sidebar-width-new: 256px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      font-family: var(--font-family-ui);
      font-size: 14px;
      line-height: 22px;
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; letter-spacing: 0; }
    button { border: 0; cursor: pointer; }
    img { display: block; object-fit: contain; }

    .app {
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg-page);
    }

    /* ==================== 顶部导航栏 ==================== */
    .menu-topbar { position: fixed; z-index: 30; top: 0; left: 0; width: 100%; height: 64px; display: flex; background: var(--color-topbar-bg); overflow: hidden; }
    .menu-logo { width: var(--sidebar-width-new); height: 64px; position: relative; display: flex; align-items: center; background: var(--color-topbar-bg); overflow: hidden; flex: 0 0 var(--sidebar-width-new); }
    .menu-logo::before { content:""; position:absolute; width:236px; height:236px; left:10px; top:-33px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.40) inset; border-radius:9999px; }
    .menu-logo::after { content:""; position:absolute; width:188px; height:188px; left:34px; top:-9px; background:var(--color-topbar-bg); box-shadow:0px 4px 10px rgba(0,0,0,0.30) inset; border-radius:9999px; }
    .menu-logo-inner { position:absolute; width:138px; height:138px; left:59px; top:16px; background:#002449; box-shadow:0px 4px 10px rgba(0,0,0,0.20) inset; border-radius:9999px; z-index:0; }
    .menu-logo-icon { position:absolute; left:28px; top:8px; width:48px; height:48px; z-index:1; }
    .menu-logo-icon img { width:48px; height:48px; }
    .menu-logo-main { position:absolute; left:88px; top:16px; z-index:1; font-size:20px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-text); white-space:nowrap; }
    .menu-logo-brand { color:rgba(58,184,255,0.90); }
    .menu-logo-sub { position:absolute; left:87px; top:39px; z-index:1; font-size:12px; font-family:var(--font-family-ui); font-weight:400; color:var(--color-topbar-sub); white-space:nowrap; }
    .menu-logo-sep { position:absolute; left:148px; top:27px; width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.30); }
    .menu-top-nav { flex:1; min-width:0; height:64px; display:flex; align-items:center; background:var(--color-topbar-bg); }
    .menu-top-track { height:64px; display:flex; align-items:center; gap:32px; padding:0 16px; }
    .menu-top-item { height:46px; display:inline-flex; align-items:center; padding:0; border:none; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; }
    .menu-top-item.is-active { border-bottom-color:var(--color-sidebar-active); }
    .menu-top-actions { height:64px; display:flex; align-items:center; padding:0 16px 0 12px; color:var(--color-topbar-text); font-size:12px; font-family:var(--font-family-ui); white-space:nowrap; flex-shrink:0; }
    .menu-actions-icons { display:flex; align-items:center; gap:16px; margin-right:20px; }
    .menu-icon-btn { width:24px; height:24px; display:flex; align-items:center; justify-content:center; background:transparent; color:var(--color-topbar-text); opacity:0.85; cursor:pointer; }
    .menu-icon-btn svg { width:18px; height:18px; }
    .menu-icon-btn:hover { opacity:1; }
    .menu-user { display:inline-flex; align-items:center; gap:8px; color:var(--color-topbar-text); font-size:12px; white-space:nowrap; }
    .menu-user-avatar { width:28px; height:28px; border-radius:50%; background:#3A8BFF; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; }
    .menu-user-meta { height:24px; display:inline-flex; align-items:center; }
    .menu-user-arrow { width:16px; height:16px; display:flex; align-items:center; justify-content:center; opacity:0.7; }
    .menu-user-arrow svg { width:12px; height:12px; }

    /* ==================== 侧边导航菜单 ==================== */
    .menu-shell { position:fixed; z-index:20; top:64px; left:0; width:var(--sidebar-width-new); height:calc(100vh - 64px); display:flex; flex-direction:column; justify-content:flex-start; background:var(--color-sidebar-bg); box-shadow:0px 2px 8px rgba(0,0,0,0.25); }
    .menu-side-list { display:flex; flex-direction:column; margin:0; padding:0; overflow:hidden auto; scrollbar-width:thin; }
    .menu-side-list::-webkit-scrollbar { width:3px; }
    .menu-side-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:50px; }
    .menu-side-item { width:256px; min-height:52px; display:flex; align-items:center; gap:12px; padding:0 8px 0 24px; border:none; border-radius:0; background:var(--color-sidebar-bg); color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; }
    .menu-side-item:hover { background:rgba(255,255,255,0.06); }
    .menu-side-item img { width:20px; height:20px; flex:0 0 auto; }
    .menu-side-item .menu-side-arrow { width:16px; height:16px; flex:0 0 auto; margin-left:auto; margin-right:12px; transition:transform 200ms ease; }
    .menu-side-item .menu-side-arrow svg { width:12px; height:12px; fill:currentColor; }
    .menu-side-item.is-expanded .menu-side-arrow { transform:rotate(90deg); }
    .menu-side-label { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .menu-sublist { display:none; flex-direction:column; margin:0; padding:0; background:var(--color-sidebar-item-bg); }
    .menu-sublist.is-open { display:flex; }
    .menu-side-item.is-expanded { background:rgba(255,255,255,0.08); }
    .menu-side-child { width:240px; height:36px; display:flex; align-items:center; margin:8px; padding:0 0 0 36px; border:none; border-radius:4px; background:transparent; color:white; font-size:14px; font-family:var(--font-family-ui); font-weight:400; text-align:left; cursor:pointer; transition:background-color 150ms ease; white-space:nowrap; position:relative; }
    .menu-side-child::before { content:""; position:absolute; left:16px; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.40); }
    .menu-side-child:hover { background:rgba(255,255,255,0.08); }
    .menu-side-child.is-active { background:var(--color-sidebar-active); color:white; }
    .menu-side-child.is-active::before { background:white; }
    .menu-collapse { display:none; }

    /* ==================== 面包屑栏 ==================== */
    .menu-breadcrumb { position:fixed; z-index:9; top:64px; left:var(--sidebar-width-new); right:0; height:50px; display:flex; align-items:center; padding:0 24px; background:white; box-shadow:0px 0px 8px 6px rgba(0,0,0,0.02); }
    .menu-breadcrumb-path { display:inline-flex; align-items:center; height:34px; gap:8px; }
    .menu-breadcrumb-tag { display:inline-flex; align-items:center; height:34px; padding:0 12px; background:#E5F3FF; border-radius:0; color:#007AFF; font-size:14px; }
    .menu-breadcrumb-tag svg { width:12px; height:12px; flex:0 0 auto; margin-right:6px; }
    .menu-breadcrumb-next { width:24px; height:34px; display:inline-flex; align-items:center; justify-content:center; color:#9EA4AE; flex:0 0 auto; }
    .menu-breadcrumb-next svg { width:12px; height:12px; }
    .menu-breadcrumb-close { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; margin-left:8px; cursor:pointer; color:#007AFF; }
    .menu-breadcrumb-close svg { width:10px; height:10px; }

    /* ==================== 页面主体 ==================== */
    .page {
      min-width: 0;
      height: 100vh;
      margin-left: var(--sidebar-width-new);
      padding: 126px 12px 12px;
      overflow: hidden;
    }

    .form-panel {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0px 0px 8px 6px rgba(0,0,0,0.02);
    }

    .form-header {
      width: 100%;
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      padding: 12px 24px;
      border-bottom: 1px solid var(--color-divider);
      background: #fff;
      border-radius: 4px 4px 0 0;
    }

    .form-header-back {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      background: transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .form-header-back:hover { color: var(--color-brand); background: var(--color-brand-light); }
    .form-header-back svg { width: 18px; height: 18px; }

    .form-title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: 18px;
      line-height: 26px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 32px 24px 24px;
      scrollbar-color: var(--color-divider) transparent;
      scrollbar-width: thin;
    }

    .form-body::-webkit-scrollbar { width: 3px; height: 3px; }
    .form-body::-webkit-scrollbar-button { width: 0; height: 0; display: none; }
    .form-body::-webkit-scrollbar-track { background: transparent; }
    .form-body::-webkit-scrollbar-thumb { border-radius: 50px; background: var(--color-divider); }

    .form-content {
      width: min(800px, 100%);
      margin: 0 auto;
    }

    /* ==================== 步骤条 ==================== */
    .steps-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--color-text-secondary);
      font-size: 14px;
    }
    .step-item.active { color: var(--color-text-primary); }
    .step-item.finished { color: var(--color-text-secondary); }
    .step-number {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--color-bg-muted);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 500;
    }
    .step-item.active .step-number { background: var(--color-brand); color: #fff; }
    .step-item.finished .step-number { background: var(--color-brand-light); color: var(--color-brand); }
    .step-line {
      width: 120px;
      height: 1px;
      background: var(--color-divider);
      margin: 0 16px;
    }
    .step-line.finished { background: var(--color-brand); }

    /* ==================== 表单分组 ==================== */
    .form-section {
      margin-bottom: 32px;
    }
    .form-section:last-child { margin-bottom: 0; }

    .form-section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 24px;
      margin-bottom: 16px;
      color: var(--color-text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
    }
    .form-section-title::before {
      content: "";
      width: 3px;
      height: 14px;
      background: var(--color-brand);
    }
    .form-section-title .tip {
      font-size: 12px;
      color: var(--color-text-placeholder);
      font-weight: 400;
      margin-left: 4px;
    }

    /* ==================== 选择卡片 ==================== */
    .range-cards {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .range-card {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .range-card:hover { border-color: var(--color-brand); }
    .range-card.selected {
      border-color: var(--color-brand);
      background: var(--color-brand-light);
      box-shadow: 0 0 0 1px var(--color-brand) inset;
    }
    .range-card-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--color-bg-muted);
      color: var(--color-brand);
      flex-shrink: 0;
    }
    .range-card.selected .range-card-icon { background: #fff; }
    .range-card-icon svg { width: 22px; height: 22px; }
    .range-card-label {
      flex: 1;
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 500;
    }
    .range-card-check {
      width: 18px;
      height: 18px;
      border: 2px solid var(--color-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .range-card.selected .range-card-check {
      border-color: var(--color-brand);
      background: var(--color-brand);
    }
    .range-card-check svg { width: 10px; height: 10px; fill: #fff; opacity: 0; }
    .range-card.selected .range-card-check svg { opacity: 1; }

    /* ==================== 人员区域 ==================== */
    .person-section {
      margin-bottom: 24px;
    }
    .person-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .person-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .person-section-title .count {
      color: var(--color-text-secondary);
      font-weight: 400;
    }
    .person-section-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .person-section-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--color-brand);
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      padding: 0;
      transition: opacity 0.15s;
    }
    .person-section-action:hover { opacity: 0.8; }
    .person-section-action svg { width: 14px; height: 14px; }
    .person-section-action.disabled { color: var(--color-text-disabled); cursor: not-allowed; pointer-events: none; }
    .select-btn-row {
      margin-bottom: 16px;
    }
    .btn-select-standalone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 24px;
      border-radius: var(--radius-component);
      background: var(--color-brand);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-select-standalone:hover {
      background: var(--color-brand-hover);
    }
    .btn-import-batch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 20px;
      border-radius: var(--radius-component);
      background: #fff;
      color: var(--color-text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--color-border);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .btn-import-batch:hover {
      border-color: var(--color-brand);
      color: var(--color-brand);
      background: var(--color-brand-light, #F0F7FF);
    }
    /* ---- 批量导入弹窗 ---- */
    .batch-import-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
    }
    .batch-import-modal.open {
      display: flex;
    }
    .batch-import-modal .modal-dialog {
      width: 560px;
      max-width: 90vw;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .batch-import-modal .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-divider);
    }
    .batch-import-modal .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .batch-import-modal .modal-close {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .batch-import-modal .modal-close:hover { color: var(--color-text-primary); }
    .batch-import-modal .modal-body {
      padding: 24px 20px;
      flex: 1;
      overflow-y: auto;
    }
    .batch-import-modal .step {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .batch-import-modal .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      background: #E6F0FF;
      color: var(--color-brand);
      border: 1px solid var(--color-brand);
    }
    .batch-import-modal .step-num.active {
      background: var(--color-brand);
      color: #fff;
    }
    .batch-import-modal .step-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 24px;
    }
    .batch-import-modal .step-content {
      margin-left: 36px;
      margin-bottom: 24px;
    }
    .batch-import-modal .template-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: #F5F9FF;
      border: 1px solid #E6F0FF;
      border-radius: 6px;
    }
    .batch-import-modal .template-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid #E6F0FF;
      border-radius: 6px;
      font-size: 22px;
      color: var(--color-brand);
      font-weight: 600;
    }
    .batch-import-modal .template-info {
      flex: 1;
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.6;
    }
    .batch-import-modal .btn-template {
      height: 30px;
      padding: 0 16px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: #fff;
      color: var(--color-text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .batch-import-modal .btn-template:hover {
      border-color: var(--color-brand);
      color: var(--color-brand);
      background: #F0F7FF;
    }
    .batch-import-modal .upload-area {
      border: 1px dashed var(--color-border);
      border-radius: 6px;
      padding: 40px 20px;
      text-align: center;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .batch-import-modal .upload-area:hover,
    .batch-import-modal .upload-area.dragover {
      border-color: var(--color-brand);
      background: #F5F9FF;
    }
    .batch-import-modal .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .batch-import-modal .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      color: #B8C0CC;
    }
    .batch-import-modal .upload-text {
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    .batch-import-modal .upload-text a {
      color: var(--color-brand);
      text-decoration: none;
    }

            </div>
            <div class="person-box" id="specifiedUserBox">
              <div class="person-tags" id="specifiedTags">
                <span class="person-tag" data-id="p1" title="正太网络科技有限公司 / 行政组 / 行政专员">
                  李敏
                  <span class="person-tag-remove" onclick="removeSpecified('p1')" title="移除">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </span>
                </span>
              </div>
            </div>
          </div>

          <!-- 部门范围 -->
          <div class="scope-section" id="deptRangeSection">
            <div class="scope-section-title">部门范围</div>
            <div class="scope-card">
              <div class="scope-card-header">
                <div class="scope-card-count" id="deptRangeCount">0个部门</div>
                <div class="scope-card-actions">
                  <button class="scope-card-action" onclick="viewScopeSelected('dept')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    查看已选
                  </button>
                  <button class="scope-card-action" onclick="removeAllDeptRanges()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    全部移除
                  </button>
                </div>
              </div>
              <div class="scope-card-body">
                <div class="scope-tags" id="deptRangeTags"></div>
              </div>
            </div>
          </div>

          <!-- 免考人员 -->
          <div class="form-section" id="exemptSection">
            <div class="person-section-header">
              <div class="person-section-title">
                免考人员
                <span class="count" id="exemptCount"></span>
              </div>
            </div>
            <button class="btn-add" onclick="openExemptPicker()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              选择
            </button>
            <div class="person-box" id="exemptBox" style="margin-top:12px; display:none;">
              <div class="person-tags" id="exemptTags"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button class="btn-outline" onclick="goPrev()">上一步</button>
        <button class="btn-primary" onclick="goNext()">保存并下一步</button>
      </div>
    </div>
  </main>
</div>

<!-- ==================== 人员选择弹窗 ==================== -->
<div class="modal-overlay" id="personModal" aria-hidden="true">
  <div class="picker-modal" id="pickerModalPanel">
    <div class="picker-loading">正在加载人员选择器...</div>
    <iframe class="picker-frame" id="personPickerFrame" title="人员选择器"></iframe>
  </div>
</div>

<script>
  let currentRange = 'partial';
  let specifiedUsers = [];
  let specifiedDeptRanges = [];
  let specifiedResolvedUsers = [...specifiedUsers];
  let exemptUsers = [];
  let exemptDeptRanges = [];
  let exemptResolvedUsers = [];
  let currentPicker = ''; // 'specified' | 'exempt'
  const MAX_VISIBLE_SELECTED_TAGS = 10;

  const rangeCards = document.querySelectorAll('.range-card');
  const selectBtnRow = document.getElementById('selectBtnRow');
  const specifiedSection = document.getElementById('specifiedUserSection');
  const deptRangeSection = document.getElementById('deptRangeSection');
  const exemptSection = document.getElementById('exemptSection');
  const personModal = document.getElementById('personModal');
  const pickerModalPanel = document.getElementById('pickerModalPanel');
  const personPickerFrame = document.getElementById('personPickerFrame');

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = String(str ?? '');
    return div.innerHTML;
  }

  function dedupeUsers(users) {
    const userMap = new Map();
    users.forEach(user => {
      if (!user || !user.id) return;
      userMap.set(String(user.id), {
        id: String(user.id),
        name: user.name || String(user.id),
        company: user.company || '',
        dept: user.dept || '',
        post: user.post || ''
      });
    });
    return [...userMap.values()];
  }

  function dedupeItems(items, normalize) {
    const itemMap = new Map();
    items.forEach(item => {
      if (!item || !item.id) return;
      const normalized = normalize(item);
      itemMap.set(String(normalized.id), normalized);
    });
    return [...itemMap.values()];
  }

  function normalizeDeptRanges(depts) {
    return dedupeItems(depts || [], dept => ({
      id: String(dept.id),
      name: dept.name || String(dept.id),
      company: dept.company || '',
      count: dept.count || 0
    }));
  }

  function hasSpecifiedSelection() {
    return specifiedUsers.length > 0 || specifiedDeptRanges.length > 0;
  }

  function removeIconSvg() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  }

  function userTagTemplate(user, removeFnName) {
    const id = escapeHTML(user.id);
    const title = [user.company, user.dept, user.post].filter(Boolean).join(' / ');
    return `
      <span class="person-tag" data-id="${id}" title="${escapeHTML(title)}">
        ${escapeHTML(user.name)}
        <span class="person-tag-remove" onclick="${removeFnName}('${id}')" title="移除">
          ${removeIconSvg()}
        </span>
      </span>
    `;
  }

  function scopeTagTemplate(item, removeFnName, label) {
    const id = escapeHTML(item.id);
    return `
      <span class="scope-tag" data-id="${id}" title="${escapeHTML(label)}">
        <span class="scope-tag-name">${escapeHTML(label)}</span>
        <span class="scope-tag-remove" onclick="${removeFnName}('${id}')" title="移除">
          ${removeIconSvg()}
        </span>
      </span>
    `;
  }

  function selectedMoreButton(hiddenCount, clickHandler) {
    if (!hiddenCount || hiddenCount <= 0 || !clickHandler) return '';
    return `<button type="button" class="selected-more-btn" onclick="${clickHandler}">查看更多${hiddenCount}项</button>`;
  }

  function renderTags(items, className, renderTag, emptyText, clickMoreHandler = '') {
    if (!items || items.length === 0) return `<div class="person-box-empty">${escapeHTML(emptyText)}</div>`;
    const visibleItems = items.slice(0, MAX_VISIBLE_SELECTED_TAGS);
    const hiddenCount = Math.max(0, items.length - MAX_VISIBLE_SELECTED_TAGS);
    return `
      <div class="${className}">
        ${visibleItems.map(renderTag).join('')}
        ${selectedMoreButton(hiddenCount, clickMoreHandler)}
      </div>
    `;
  }

  function renderExemptBlock(title, amount, bodyHTML, viewHandler, removeHandler) {
    const hasActions = viewHandler && removeHandler;
    return `
      <div class="exempt-selection-block">
        <div class="exempt-selection-title">
          <span>${escapeHTML(title)}</span>
          <span class="exempt-selection-count">（${escapeHTML(amount)}）</span>
          ${hasActions ? `
          <div class="exempt-selection-actions">
            <button type="button" class="exempt-selection-action" onclick="${viewHandler}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              查看已选
            </button>
            <button type="button" class="exempt-selection-action" onclick="${removeHandler}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              全部移除
            </button>
          </div>
          ` : ''}
        </div>
        ${bodyHTML}
      </div>
    `;
  }

  function formatScopeName(company, name) {
    return name || company || '';
  }

  function setRange(value) {
    currentRange = value;
    rangeCards.forEach(card => {
      const selected = card.dataset.value === value;
      card.classList.toggle('selected', selected);
    });
    // 组织内全部人员时，隐藏选择按钮、指定用户和免考人员区域
    if (value === 'all') {
      selectBtnRow.style.display = 'none';
      specifiedSection.style.display = 'none';
      deptRangeSection.classList.remove('is-visible');
      exemptSection.style.display = 'none';
    } else {
      selectBtnRow.style.display = 'block';
      renderSpecified();
      renderScopeRanges();
      exemptSection.style.display = 'block';
    }
  }

  function renderSpecified() {
    const count = document.getElementById('specifiedCount');
    const box = document.getElementById('specifiedUserBox');
    const hasScopeRanges = specifiedDeptRanges.length > 0;
    if (currentRange === 'partial') {
      specifiedSection.style.display = specifiedUsers.length > 0 ? 'block' : 'none';
    }
    count.textContent = '（' + specifiedUsers.length + '人）';
    if (specifiedUsers.length === 0) {
      box.innerHTML = '<div class="person-box-empty">暂无指定用户</div>';
    } else {
      box.innerHTML = `
        <div class="person-tags" id="specifiedTags">
          ${specifiedUsers.slice(0, MAX_VISIBLE_SELECTED_TAGS).map(u => userTagTemplate(u, 'removeSpecified')).join('')}
          ${selectedMoreButton(Math.max(0, specifiedUsers.length - MAX_VISIBLE_SELECTED_TAGS), "viewScopeSelected('person')")}
        </div>
      `;
    }

    const hasSpecified = hasSpecifiedSelection();
    document.getElementById('btnViewSelected').classList.toggle('disabled', !hasSpecified);
    document.getElementById('btnRemoveAll').classList.toggle('disabled', !hasSpecified);
  }

  function renderScopeRanges() {
    const hasDeptRanges = currentRange === 'partial' && specifiedDeptRanges.length > 0;

    deptRangeSection.classList.toggle('is-visible', hasDeptRanges);

    document.getElementById('deptRangeCount').textContent = specifiedDeptRanges.length + '个部门';

    document.getElementById('deptRangeTags').innerHTML = specifiedDeptRanges
      .slice(0, MAX_VISIBLE_SELECTED_TAGS)
      .map(dept => scopeTagTemplate(dept, 'removeDeptRange', formatScopeName(dept.company, dept.name)))
      .join('') + selectedMoreButton(Math.max(0, specifiedDeptRanges.length - MAX_VISIBLE_SELECTED_TAGS), "viewScopeSelected('dept')");
  }

  function renderExempt() {
    const count = document.getElementById('exemptCount');
    const box = document.getElementById('exemptBox');
    const hasExempt = exemptUsers.length > 0 || exemptDeptRanges.length > 0;
    count.textContent = '';
    if (!hasExempt) {
      box.style.display = 'none';
      return;
    }
    const userBlock = exemptUsers.length > 0 ? renderExemptBlock(
      '已选人员',
      exemptUsers.length + '人',
      renderTags(exemptUsers, 'person-tags', user => userTagTemplate(user, 'removeExempt'), '暂无已选人员', "viewExemptSelected('person')"),
      "viewExemptSelected('person')",
      'removeAllExemptUsers()'
    ) : '';
    const deptBlock = exemptDeptRanges.length > 0 ? renderExemptBlock(
      '已选部门',
      exemptDeptRanges.length + '个部门',
      renderTags(exemptDeptRanges, 'scope-tags', dept => scopeTagTemplate(dept, 'removeExemptDept', formatScopeName(dept.company, dept.name)), '暂无已选部门', "viewExemptSelected('dept')"),
      "viewExemptSelected('dept')",
      'removeAllExemptDepts()'
    ) : '';
    box.style.display = 'block';
    box.innerHTML = `
      <div class="exempt-selection">
        ${userBlock}
        ${deptBlock}
      </div>
    `;
  }

  function removeSpecified(id) {
    specifiedUsers = specifiedUsers.filter(u => u.id !== String(id));
    specifiedResolvedUsers = specifiedResolvedUsers.filter(u => u.id !== String(id));
    renderSpecified();
  }

  function removeExempt(id) {
    exemptUsers = exemptUsers.filter(u => u.id !== String(id));
    exemptResolvedUsers = exemptResolvedUsers.filter(u => u.id !== String(id));
    renderExempt();
  }

  function removeExemptDept(id) {
    exemptDeptRanges = exemptDeptRanges.filter(item => item.id !== String(id));
    renderExempt();
  }

  function removeAllExemptUsers() {
    exemptUsers = [];
    renderExempt();
  }

  function removeAllExemptDepts() {
    exemptDeptRanges = [];
    renderExempt();
  }

  function removeAllExempt() {
    exemptUsers = [];
    exemptDeptRanges = [];
    exemptResolvedUsers = [];
    renderExempt();
  }

  function removeAllSpecified() {
    specifiedUsers = [];
    specifiedDeptRanges = [];
    specifiedResolvedUsers = [];
    renderSpecified();
    renderScopeRanges();
  }

  function removeDeptRange(id) {
    specifiedDeptRanges = specifiedDeptRanges.filter(item => item.id !== String(id));
    renderSpecified();
    renderScopeRanges();
  }

  function removeAllDeptRanges() {
    specifiedDeptRanges = [];
    renderSpecified();
    renderScopeRanges();
  }

  function viewScopeSelected(type) {
    openPersonPicker(type, type);
  }

  function viewExemptSelected(type) {
    currentPicker = 'exempt';
    openPickerModal({
      users: exemptUsers,
      depts: exemptDeptRanges,
      activeTab: type,
      viewSelectedType: type
    });
  }

  function getExemptDefaultSelectedType() {
    return exemptUsers.length > 0 ? 'person' : 'dept';
  }

  function openPersonPicker(activeTab = 'person', viewSelectedType = '') {
    currentPicker = 'specified';
    openPickerModal({
      users: specifiedUsers,
      depts: specifiedDeptRanges,
      activeTab,
      viewSelectedType
    });
  }

  function openExemptPicker() {
    currentPicker = 'exempt';
    openPickerModal({
      users: exemptUsers,
      depts: exemptDeptRanges,
      activeTab: 'person'
    });
  }

  function openPickerModal(selection) {
    const selectedIds = (selection.users || []).map(u => String(u.id));
    const selectedDeptIds = (selection.depts || []).map(item => String(item.id));
    pickerModalPanel.classList.remove('is-loaded');
    /* 弹窗打开时隐藏页面级角标 */
    document.body.classList.add('modal-open');
    document.querySelectorAll('.prd-annotation-popover').forEach(node => node.remove());
    personModal.classList.add('show');
    personModal.setAttribute('aria-hidden', 'false');

    personPickerFrame.onload = () => {
      pickerModalPanel.classList.add('is-loaded');
      personPickerFrame.contentWindow.postMessage({
        type: 'person-picker:init',
        payload: {
          context: currentPicker,
          personIds: selectedIds,
          deptIds: selectedDeptIds,
          activeTab: selection.activeTab || 'person',
          viewSelectedType: selection.viewSelectedType || ''
        }
      }, '*');
    };
    personPickerFrame.src = '人员选择-下级单位.html?embed=1&context=' + encodeURIComponent(currentPicker) + '&t=' + Date.now();
  }

  function closeModal() {
    document.body.classList.remove('modal-open');

    personModal.classList.remove('show');
    personModal.setAttribute('aria-hidden', 'true');
    personPickerFrame.onload = null;
    personPickerFrame.removeAttribute('src');
  }

  function applyPickerResult(result) {
    const directUsers = dedupeUsers(result?.person || []);
    const resolvedUsers = dedupeUsers(result?.resolvedPersons || directUsers);
    if (currentPicker === 'specified') {
      specifiedUsers = directUsers;
      specifiedDeptRanges = normalizeDeptRanges(result?.dept || []);
      specifiedResolvedUsers = resolvedUsers;
      renderSpecified();
      renderScopeRanges();
    } else if (currentPicker === 'exempt') {
      exemptUsers = directUsers;
      exemptDeptRanges = normalizeDeptRanges(result?.dept || []);
      exemptResolvedUsers = resolvedUsers;
      renderExempt();
    }
  }

  window.addEventListener('message', event => {
    const data = event.data;
    if (!data || typeof data !== 'object') return;
    if (data.type === 'person-picker:confirm') {
      applyPickerResult(data.payload);
      closeModal();
    }
    if (data.type === 'person-picker:close') {
      closeModal();
    }
    if (data.type === 'person-picker:resize') {
      pickerModalPanel.classList.add('is-loaded');
      if (data.height) {
        personPickerFrame.style.height = data.height + 'px';
      }
    }
  });

  personModal.addEventListener('click', event => {
    if (event.target === personModal) closeModal();
  });

  document.addEventListener('keydown', event => {
    if (event.key === 'Escape' && personModal.classList.contains('show')) {
      closeModal();
    }
  });

  function goPrev() {
    alert('返回上一步：基本信息');
  }

  function goNext() {
    if (currentRange === 'partial' && !hasSpecifiedSelection()) {
      alert('请至少选择一名指定用户、一个部门或一个岗位');
      return;
    }
    alert('保存并进入下一步：考试设置');
  }

  // 侧边栏分组折叠
  document.querySelectorAll('.menu-side-item[data-group]').forEach(item => {
    item.addEventListener('click', () => {
      const group = item.dataset.group;
      const sublist = document.querySelector('.menu-sublist[data-group="' + group + '"]');
      if (sublist) {
        item.classList.toggle('is-expanded');
        sublist.classList.toggle('is-open');
      }
    });
  });

  // ==================== 批量导入 ====================
  let batchImportSelectedFile = null;

  function openBatchImportModal() {
    document.getElementById('batchImportModal').classList.add('open');
    document.body.classList.add('modal-open');
  }

  function closeBatchImportModal() {
    document.getElementById('batchImportModal').classList.remove('open');
    document.body.classList.remove('modal-open');
    resetBatchImport();
  }

  function resetBatchImport() {
    batchImportSelectedFile = null;
    const fileInput = document.getElementById('batchImportFile');
    if (fileInput) fileInput.value = '';
    const uploadArea = document.getElementById('batchImportUploadArea');
    const uploadText = document.getElementById('batchImportUploadText');
    if (uploadArea && uploadText) {
      uploadArea.classList.remove('has-file');
      uploadText.innerHTML = '将文件拖到此处，或 <a href="javascript:void(0)">点击上传</a><br>最大支持5M、仅xls、xlsx的文件';
    }
    const submitBtn = document.getElementById('batchImportSubmit');
    if (submitBtn) submitBtn.disabled = true;
  }

  function downloadBatchTemplate() {
    const BOM = '\uFEFF';
    const csv = BOM + '姓名,手机号\n';
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = '考生导入模板.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function handleBatchImportFileSelect(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    batchImportSelectedFile = file;
    const uploadArea = document.getElementById('batchImportUploadArea');
    const uploadText = document.getElementById('batchImportUploadText');
    if (uploadArea && uploadText) {
      uploadArea.classList.add('has-file');
      uploadText.innerHTML = '<div class="upload-file"><span>' + escapeHTML(file.name) + '</span><span class="remove-file" onclick="event.preventDefault(); event.stopPropagation(); resetBatchImport()" title="移除">&times;</span></div>';
    }
    const submitBtn = document.getElementById('batchImportSubmit');
    if (submitBtn) submitBtn.disabled = false;
  }

  // 模拟导入：根据文件名展示不同结果
  function submitBatchImport() {
    if (!batchImportSelectedFile) {
      alert('请先上传文件');
      return;
    }

    const fileName = batchImportSelectedFile.name.toLowerCase();
    let success = 0, skip = 0, fail = 0, failedRows = [];

    if (fileName.includes('失败') || fileName.includes('error') || fileName.includes('fail')) {
      // 全部失败
      success = 0; skip = 0; fail = 3;
      failedRows = [
        { name: '张三', phone: '13800138001', error: '手机号格式错误，请填写11位数字，以1开头' },
        { name: '李四', phone: '', error: '手机号为空，请填写手机号' },
        { name: '王五', phone: '13900139002', error: '姓名长度超过限制（最大10个字符），请调整' }
      ];
    } else if (fileName.includes('跳过') || fileName.includes('skip') || fileName.includes('重复')) {
      // 部分成功 + 跳过
      success = 2; skip = 2; fail = 0;
    } else {
      // 默认全部成功
      success = 3; skip = 0; fail = 0;
    }

    // 将成功数据合并到已选用户（仅模拟）
    if (success > 0) {
      const importedUsers = generateMockImportedUsers(success);
      importedUsers.forEach(user => {
        if (!specifiedUsers.some(u => u.id === user.id)) {
          specifiedUsers.push(user);
          if (!specifiedResolvedUsers.some(u => u.id === user.id)) {
            specifiedResolvedUsers.push(user);
          }
        }
      });
      renderSpecified();
    }

    // 结果提示
    let message = '';
    if (fail === 0) {
      message = '成功导入 ' + success + ' 名考生' + (skip > 0 ? '，跳过 ' + skip + ' 人（已存在）' : '');
      alert(message);
    } else {
      message = '成功导入 ' + success + ' 人，跳过 ' + skip + ' 人（已存在），失败 ' + fail + ' 人。';
      if (fail > 0) {
        message += ' 是否下载错误文件查看原因？';
      }
      if (confirm(message)) {
        downloadBatchErrorFile(failedRows);
      }
    }

    if (fail === 0) {
      closeBatchImportModal();
    }
  }

  function generateMockImportedUsers(count) {
    const samples = [
      { id: 'import_001', name: '导入考生一', company: '福建华电可门发电', dept: '行政部', post: '职员' },
      { id: 'import_002', name: '导入考生二', company: '福建华电可门发电', dept: '生产部', post: '专员' },
      { id: 'import_003', name: '导入考生三', company: '华电集团新能源', dept: '安监部', post: '经理' }
    ];
    return samples.slice(0, count);
  }

  function downloadBatchErrorFile(rows) {
    const BOM = '\uFEFF';
    let csv = BOM + '姓名,手机号,错误信息\n';
    rows.forEach(row => {
      csv += (row.name || '') + ',' + (row.phone || '') + ',' + (row.error || '') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = '导入错误信息.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // 拖拽上传增强
  const batchImportUploadArea = document.getElementById('batchImportUploadArea');
  if (batchImportUploadArea) {
    ['dragenter', 'dragover'].forEach(eventName => {
      batchImportUploadArea.addEventListener(eventName, function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.add('dragover');
      }, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
      batchImportUploadArea.addEventListener(eventName, function(e) {
        e.preventDefault();
        e.stopPropagation();
        this.classList.remove('dragover');
      }, false);
    });
    batchImportUploadArea.addEventListener('drop', function(e) {
      const files = e.dataTransfer.files;
      if (files.length) {
        const fileInput = document.getElementById('batchImportFile');
        fileInput.files = files;
        handleBatchImportFileSelect(fileInput);
      }
    }, false);
  }

  // 点击弹窗背景关闭
  document.getElementById('batchImportModal').addEventListener('click', function(e) {
    if (e.target === this) closeBatchImportModal();
  });

  // 初始化
  renderSpecified();
  renderScopeRanges();
  renderExempt();
</script>


  <script type="application/json" id="prd-annotation-config">
{

  "scope": "with_global",
  "showPrdActions": true,
  "pagePrd": "# 新增考试-下级单位 PRD\n\n## 1. 文档范围\n\n本文档仅描述\"新增考试-下级单位\"页面本次新增功能范围，包括下级单位范围内创建考试、人员和部门范围选择、已选结果回显（不按公司分组）、免考人员配置、人员快照生成和新入职人员处理。\n\n与集团版的核心区别：下级单位不展示所属公司字段，已选人员和部门不按公司分组展示，选择范围限定在本单位及下属部门。\n\n原有考试基本信息、考试设置、题目配置、步骤条流转、通用表单校验等基础能力沿用既有规则，本文不重复说明。\n\n> 本页面PRD需配合[《考试功能-整体PRD》](./考试功能-整体PRD.md)阅读，全局业务规则、数据模型、角色权限定义和核心流程参见整体PRD。\n\n## 2. 使用角色\n\n- 下级单位管理员：在本单位端创建考试，选择本单位及下属部门范围内的人员或部门作为考试对象，并配置免考范围。\n- 系统：根据管理员选择的考试对象生成创建考试时人员快照，用于后续草稿发布前人员变更校验。\n\n## 3. 功能清单\n\n| 模块 | 功能 | 功能描述 |\n|------|------|----------|\n| 考生范围 | 本单位范围内创建 | 支持下级单位管理员在本单位及下属部门范围内创建考试。 |\n| 考生范围 | 选择人员和部门 | 本次新增范围仅支持选择人员和部门范围。 |\n| 已选结果 | 不分公司回显 | 已选人员按姓名标签展示、已选部门按名称标签展示，不按公司分组。 |\n| 人员选择器 | 选择和查看已选 | 支持选人员、选部门、查看已选、全部移除，并将选择结果回写页面。 |\n| 免考人员 | 免考范围配置 | 支持配置免考人员和免考部门范围，并回显已选结果。 |\n| 人员快照 | 创建快照 | 创建考试草稿时生成创建考试时人员快照。 |\n| 发布校验 | 快照基准 | 草稿发布前以创建或最近一次编辑后的人员快照为基准进行变更校验。 |\n\n## 4. 需求说明\n\n### 4.1 考试对象范围\n\n| 规则项 | 页面要求 |\n|--------|----------|\n| 创建范围 | 仅支持本单位及下属部门范围内创建考试，不支持跨平级单位或上级单位。 |\n| 选择对象 | 本次新增功能仅支持选择人员和部门范围。 |\n| 去重规则 | 系统自动对重复选择的人员进行去重，确保同一考试内同一人员只进入一次考生范围。 |\n| 全部人员 | 选择\"组织内全部人员\"时，隐藏指定用户、部门范围和免考人员配置区。 |\n| 部分人员 | 选择\"仅部分人员\"时，展示选择入口、指定用户、部门范围和免考人员配置区。 |\n| 所属公司 | 不展示所属公司字段，已选结果不按公司划分区域。 |\n\n### 4.2 人员选择器\n\n#### 4.2.1 打开入口与选择范围\n\n| 项目 | 规则 |\n|------|------|\n| 考生范围选择入口 | 点击考生范围中的\"选择\"按钮，打开下级单位人员选择器，用于选择本次考试对象。 |\n| 免考范围选择入口 | 点击免考人员区域的\"选择\"按钮，打开下级单位人员选择器，用于选择本次考试的免考对象。 |\n| 查看已选入口 | 指定用户、部门范围均支持进入查看已选，用于核对和维护已选结果。 |\n| 选择范围 | 仅支持在本单位及下属部门范围内选择人员和部门。 |\n| 选择对象 | 本次新增功能仅支持选择人员和部门范围。 |\n| 人员选择器页面 | 使用 `人员选择-下级单位.html`，不支持跨公司选择。 |\n\n#### 4.2.2 选择模式\n\n| 模式 | 规则 |\n|------|------|\n| 选人员 | 支持按人员维度选择考试对象；可结合姓名、部门名称等条件进行查询，选择后同步进入右侧已选人员区域。 |\n| 选部门 | 支持按部门维度选择考试对象；部门选择结果同步进入右侧已选部门区域。 |\n| 部门级联 | 选择部门时支持按本单位部门层级展开，不涉及跨公司层级。 |\n| 包含下级部门员工 | 选择部门范围时支持按业务需要包含下级部门员工，用于形成完整的部门考试对象范围。 |\n| 已选数量 | 右侧已选区域分别展示人员数量和部门数量，选择、取消选择或移除后实时刷新。 |\n\n#### 4.2.3 查询条件\n\n| 所在区域 | 查询项 | 查询规则 |\n|----------|--------|----------|\n| 选人员列表 | 姓名、部门名称 | 姓名支持按输入内容查询；部门名称支持按本单位部门层级选择后查询。 |\n| 选部门列表 | 部门名称 | 支持按部门名称查询部门树，匹配到的部门及其上级层级需保留展示。 |\n| 查看已选人员 | 姓名、部门 | 仅在已选人员范围内查询，不影响未选人员列表。 |\n| 查看已选部门 | 部门 | 仅在已选部门范围内查询，不影响未选部门列表。 |\n| 查询按钮 | 执行当前条件查询 | 点击后刷新当前列表结果、已选状态和分页。 |\n| 重置按钮 | 清空当前查询条件 | 点击后恢复当前列表默认结果，并保留已选结果。 |\n\n#### 4.2.4 列表展示项\n\n| 列表区域 | 展示项 | 展示规则 |\n|----------|--------|----------|\n| 选人员列表 | 勾选框、姓名、所属部门 | 支持单个勾选、本页全选、分页展示；已选人员在列表中保持选中状态。**不展示所属公司列。** |\n| 选部门列表 | 勾选框、部门名称、部门人数、部门层级 | 以部门层级方式展示；勾选部门时需联动右侧已选部门数量。 |\n| 右侧已选人员 | 已选人员标签、人员数量 | 展示已选人员数量和人员标签，支持从标签上移除单个人员。 |\n| 右侧已选部门 | 已选部门标签、部门数量 | 展示已选部门数量和部门名称标签（仅展示部门名称，不含公司名），支持从标签上移除单个部门。 |\n| 查看已选人员列表 | 勾选框、姓名、所属部门、操作 | 仅展示已选人员；支持单个移除和批量删除。不展示所属公司列。 |\n| 查看已选部门列表 | 勾选框、部门名称、人数、操作 | 仅展示已选部门；支持单个移除和批量删除。不展示所属公司列。 |\n| 空状态 | 暂无数据提示 | 当前查询或已选范围无数据时，列表展示空状态提示。 |\n\n#### 4.2.5 查看已选与移除\n\n| 操作 | 规则 |\n|------|------|\n| 查看已选人员 | 展示当前已选人员清单，支持继续核对和移除。 |\n| 查看已选部门 | 展示当前已选部门清单，支持继续核对和移除。 |\n| 单个移除 | 支持从已选区域移除单个人员或单个部门。 |\n| 全部移除 | 支持清空当前范围内已选人员或部门，清空后同步刷新数量和页面回显。 |\n| 确认返回 | 点击确定后，将当前已选人员、部门以及系统解析出的人员范围返回新增考试页面。 |\n| 取消或关闭 | 取消或关闭人员选择器时，不更新新增考试页面当前已选结果。 |\n\n#### 4.2.6 返回与回显规则\n\n| 项目 | 规则 |\n|------|------|\n| 人员信息 | 返回人员需包含人员 ID、姓名、部门、人员状态等信息，用于创建考试时人员快照和后续发布校验。不返回所属公司。 |\n| 部门信息 | 返回部门需包含部门名称、部门范围等信息，用于页面回显和人员范围解析。不返回所属公司。 |\n| 去重规则 | 人员和部门范围解析后，如出现同一人员重复命中，系统需自动去重。 |\n| 页面回显 | 选择结果返回页面后，立即刷新指定用户、部门范围的数量和标签。部门区域不显示时，隐藏整个部门范围区块。 |\n| 不分组展示 | 已选人员和部门不按公司分组展示，以平铺标签形式呈现。 |\n\n### 4.3 已选人员和部门回显\n\n| 展示对象 | 展示规则 |\n|----------|----------|\n| 已选人员 | 展示在\"指定用户\"区域，以姓名标签平铺展示，不按公司分组。标签上仅显示姓名，hover 可查看完整部门路径。 |\n| 已选部门 | 展示在\"部门范围\"区域，以部门名称标签平铺展示。 |\n| 单个移除 | 支持移除单个人员或单个部门。 |\n| 全部移除 | 支持清空当前已选人员和部门范围。 |\n| 可见性 | 未选择人员时，不展示指定用户区域；未选择部门时，不展示部门范围区域。 |\n| 数量展示 | 指定用户区域标题旁展示人员数量（如\"1人\"），部门区域标题旁展示部门数量（如\"0个部门\"）。 |\n| 超量展示 | 页面已选人员、已选部门或免考已选结果超过 10 条时，页面最多展示前 10 条标签，并展示\"查看更多 X 项\"入口；X = 当前已选总条数 - 10。 |\n| 查看更多 | 点击\"查看更多 X 项\"时，等同于点击当前区域的\"查看已选\"按钮，打开人员选择器的已选视图，用于查看和维护完整已选结果。 |\n\n### 4.4 免考人员配置\n\n| 项目 | 规则 |\n|------|------|\n| 配置入口 | 点击\"免考人员\"区域的\"选择\"按钮，打开下级单位人员选择器。 |\n| 免考对象 | 支持选择免考人员和免考部门范围。 |\n| 结果回显 | 页面展示已选免考人员数量、免考部门数量。已选结果不按公司分组，以标签形式平铺展示。 |\n| 查看已选 | 存在免考对象时，支持查看已选免考人员或免考部门。 |\n| 超量展示 | 免考已选人员或免考已选部门超过 10 条时，页面最多展示前 10 条标签，并展示\"查看更多 X 项\"入口；X = 当前免考已选总条数 - 10。 |\n| 全部移除 | 支持一键清空所有免考人员和免考部门。 |\n| 业务口径 | 免考范围需随考试对象一并保存，用于后续应考人数和考试流程口径计算。 |\n\n### 4.5 人员快照生成\n\n| 场景 | 快照规则 |\n|------|----------|\n| 创建草稿 | 创建考试草稿时，系统基于当前考试对象生成创建考试时人员快照。 |\n| 编辑保存 | 后续每次编辑保存后，需覆盖原人员快照。 |\n| 快照内容 | 快照需保留人员 ID、姓名、部门、人员状态等信息。不含所属公司。 |\n| 校验用途 | 快照用于草稿发布前比对当前考试对象和创建或编辑时的人员差异。 |\n\n### 4.6 新入职人员处理\n\n- 新入职人员不会自动进入已创建考试。\n- 当考试对象为部门范围时，如果草稿发布前存在转入部门或启用人员，需在发布弹窗\"新增\"分类中提示。\n- 管理员需要在发布弹窗中确认人员变更后，考试才继续发布。\n\n## 5. 交互设计\n\n### 5.1 选择考生范围\n\n- 选择\"仅部分人员\"后，页面展示人员选择按钮、指定用户区域（有人员时）和部门范围区域（有部门时）。\n- 选择\"组织内全部人员\"后，页面隐藏选择按钮、指定用户区域、部门范围区域和免考人员配置区。\n- 从人员选择器确认返回后，页面即时刷新已选结果。\n\n### 5.2 查看和移除已选\n\n- 点击\"查看已选\"时，打开人员选择器的已选视图。\n- 当页面已选标签超过 10 条时，仅展示前 10 条，并显示\"查看更多 X 项\"；点击后打开对应区域的查看已选视图，X = 当前已选总条数 - 10。\n- 点击单个标签的移除按钮时，仅移除该人员或部门，其他标签保持不动。\n- 点击\"全部移除\"时，清空当前区域已选结果，并同步刷新数量。\n\n### 5.3 保存与快照\n\n- 保存草稿或完成本步骤保存时，系统生成或更新人员快照。\n- 保存后进入后续考试设置流程。\n- 后续发布校验以最新创建或编辑快照为基准。\n\n### 5.4 页面跳转\n\n- 点击\"上一步\"返回基本信息步骤。\n- 点击\"保存并下一步\"进入考试设置步骤，保存前需校验至少选择了一名用户或一个部门。\n\n## 6. 异常处理\n\n| 异常场景 | 处理方式 |\n|----------|----------|\n| 仅部分人员但未选择考试对象 | 提示管理员至少选择一名指定用户或一个部门。 |\n| 人员选择器取消或关闭 | 不更新当前页面已选结果。 |\n| 当前区域无已选结果 | \"查看已选\"和\"全部移除\"按钮置灰不可用。 |\n| 指定用户区域无人员时 | 隐藏整个指定用户区域。 |\n| 部门范围区域无部门时 | 隐藏整个部门范围区域。 |\n\n## 7. 验收标准\n\n| 验收项 | 验收标准 |\n|--------|----------|\n| 选择范围 | 仅支持在本单位及下属部门范围内选择人员和部门，不可跨平级或上级单位。 |\n| 人员选择器 | 使用下级单位人员选择器（`人员选择-下级单位.html`），不支持跨公司选择。 |\n| 不展示所属公司 | 选人员列表、查看已选人员列表、已选人员标签、已选部门标签均不展示所属公司字段。 |\n| 不按公司分组 | 已选人员和部门不按公司分组展示，以平铺标签形式呈现。 |\n| 已选回显 | 已选人员以姓名标签回显，hover 可查看部门路径；已选部门以名称标签回显。 |\n| 已选超量展示 | 页面已选结果超过 10 条时最多展示 10 条标签，并展示\"查看更多 X 项\"；点击后打开对应查看已选视图，X = 当前已选总条数 - 10。 |\n| 免考配置 | 支持选择免考人员和免考部门，以标签平铺形式回显。 |\n| 查看已选 | 指定用户、部门范围均支持查看已选。 |\n| 移除能力 | 支持单个移除和全部移除已选结果。 |\n| 快照生成 | 创建考试草稿时必须生成人员快照，快照不含所属公司。 |\n| 快照覆盖 | 每次编辑保存后必须覆盖原人员快照。 |\n| 快照内容 | 快照必须包含人员状态字段。 |\n| 新入职处理 | 新入职人员不会自动进入已创建考试，部门范围新增人员在发布校验中提示。 |\n| 组织内全部人员 | 选择后隐藏选择按钮、指定用户、部门范围和免考人员配置区。 |\n\n## 8. 版本变更记录\n\n| 版本 | 日期 | 变更内容 |\n|------|------|----------|\n| V1.0 | 2026-07-13 | 新增下级单位新增考试页面本单位范围内创建考试、人员和部门选择、免考配置、人员快照和发布校验相关 PRD。 |\n| V1.1 | 2026-07-13 | 明确人员选择器右侧已选部门标签仅展示部门名称，不含公司名。 |\n| V1.2 | 2026-07-14 | 补充页面已选结果超过 10 条时最多展示 10 条、展示\"查看更多 X 项\"及点击进入查看已选视图的规则。 |\n",
  "globalPrd": "# 考试功能 — 整体 PRD\n\n## 1. 引言\n\n### 1.1 背景与目标\n\n\"考试功能\"是 EHS+ 企业版中对员工进行安全生产知识评测的核心模块。该模块需要支持三种不同的租户形态：\n\n- **集团（上级单位）**：跨多家子公司的人员管理形态，需要跨公司选择考试对象、查看跨公司统计数据。\n- **下级单位**：处于集团层级下的成员单位，承接上级派发的考试，同时可创建本单位内部考试。\n- **独立租户（普通租户/非集团）**：无上下级层级关系的独立组织，仅管理本租户范围内的考试。\n\n本 PRD 从全局视角定义考试功能在上述三种租户形态下的统一业务规则、数据模型、角色权限和核心流程。各页面的详细交互规格请参见对应的页面 PRD。\n\n### 1.2 用户价值\n\n| 租户类型 | 核心价值 |\n|----------|----------|\n| 集团管理员 | 跨公司统一下发安全知识考试，掌握全集团各子公司的考试进展与成绩分布。 |\n| 下级单位管理员 | 承接集团下发的考试任务，同时自主创建本单位专属考试来满足内部学习需求。 |\n| 普通租户管理员 | 自主管理本组织的考试全生命周期，从创建、发布到统计分析形成完整闭环。 |\n\n### 1.3 功能范围\n\n**包含**：\n\n| 模块 | 说明 |\n|------|------|\n| 考试列表 | 按租户类型展示对应的考试清单，支持新增、编辑、删除、复制、发布（草稿）、管理（统计入口） |\n| 新增考试 | 三步创建考试：基本信息 → 考生范围（人员/部门选择 + 免考） → 考试设置 |\n| 编辑考试 | 修改草稿考试的考生范围，覆盖人员快照 |\n| 考试统计 | 考生分析、考试记录、部门统计三个维度，含人员状态筛选和部门统计在职过滤 |\n| 人员选择 | 按租户数据范围选择考试对象（人员 + 部门） |\n| 发布校验 | 草稿发布前对人员快照与当前人员主数据的差异进行校验与确认 |\n\n**不包含**：\n\n- 试题配置与管理（考试设置步骤中的具体试题选择不属于本次范围）\n- 考生端的考试作答/提交/成绩查看\n- 移动端管理能力\n\n---\n\n## 2. 三种租户形态概览\n\n```\n┌──────────────────────────────────────────────────────────────────┐\n│                        EHS+ 考试功能                              │\n│                                                                   │\n│  ┌──────────────┐    ┌──────────────────┐    ┌───────────────┐   │\n│  │ 集团         │    │  下级单位         │    │ 独立租户      │   │\n│  │ (上级单位)    │───▶│  (子公司/分公司)   │    │ (非集团组织)   │   │\n│  │              │    │                  │    │               │   │\n│  │ • 跨公司选人  │    │ • 承接上级考试    │    │ • 自建考试    │   │\n│  │ • 自建考试    │    │ • 自建本单位考试  │    │ • 本单位数据  │   │\n│  │ • 跨公司统计  │    │ • 本单位统计     │    │ • 本单位统计  │   │\n│  └──────────────┘    └──────────────────┘    └───────────────┘   │\n│                                                                   │\n│  数据范围: 集团全部公司     数据范围: 本单位+下属部门                  │\n│  人员列: 含\"所属公司\"      人员列: 无\"所属公司\"                   无公司概念 │\n│  统计视图: 部门明细/公司汇总 统计视图: 部门明细                     同下级单位 │\n└──────────────────────────────────────────────────────────────────┘\n```\n\n### 2.1 核心差异对照表\n\n| 差异维度 | 集团 | 下级单位 | 独立租户/普通租户 |\n|----------|------|----------|-------------------|\n| 人员数据范围 | 集团内全部公司 | 本单位 + 下属部门 | 本租户内全部人员 |\n| 跨公司选人 | ✅ 支持 | ❌ 不支持 | ❌ 不涉及（无公司概念） |\n| 上级下发考试 | ❌ 不涉及 | ✅ 考试列表展示上级下发 | ❌ 不涉及 |\n| 上级下发考试操作 | — | 仅\"管理\" | — |\n| 人员列表分组 | 按公司分组 | 不分组、平铺展示 | 不分组、平铺展示 |\n| 考生分析/考试记录列表 | 含\"所属公司\"列 | 无\"所属公司\"列 | 无\"所属公司\"列 |\n| 部门筛选方式 | 公司+部门级联 | 部门下拉树 | 部门下拉树 |\n| 统计部门视图 | 部门明细 + 公司汇总 | 部门明细 | 部门明细 |\n| 人员选择器页面 | 人员选择-集团 | 人员选择-下级单位 | 人员选择-下级单位 |\n\n---\n\n## 3. 角色与权限\n\n| 角色 | 租户端 | 可创建考试 | 可选择的考试对象范围 | 可编辑考试 | 可查看统计 | 说明 |\n|------|--------|-----------|---------------------|-----------|-----------|------|\n| 集团管理员 | 集团 | ✅ | 集团全部公司的人员和部门 | ✅ 仅草稿 | ✅ 全集团 | 可跨公司管理考试全生命周期 |\n| 下级单位管理员 | 下级单位 | ✅ 本单位考试 | 本单位 + 下属部门 | ✅ 仅自建草稿 | ✅ 本单位 | 可承接上级下发考试，对其进行管理操作 |\n| 普通租户管理员 | 独立租户 | ✅ | 本租户全量人员 | ✅ 仅草稿 | ✅ 本租户 | 与下级单位类似，但无上下级关系 |\n\n### 3.1 下级单位对上级下发考试的操作权限\n\n| 操作 | 本单位自建考试 | 上级下发考试 |\n|------|:---:|:---:|\n| 查看详情（名称链接） | ✅ | ✅（查看集团版详情） |\n| 管理（进入统计） | ✅ | ✅ |\n| 预览 | ✅ | ❌ |\n| 发布 | ✅ 草稿 | ❌ |\n| 编辑 | ✅ 草稿 | ❌ |\n| 复制 | ✅ | ❌ |\n| 删除 | ✅ | ❌ |\n| 批量删除 | ✅ | ❌ |\n\n---\n\n## 4. 名词解释\n\n| 术语 | 定义 |\n|------|------|\n| **考试** | 一次完整的考试活动，包含基本信息、考生范围、考试设置、题目配置等。 |\n| **考生范围** | 考试的目标对象集合，可通过选择人员（指定用户）或部门范围来定义。 |\n| **指定用户** | 以单个人员为维度选定的考试对象。 |\n| **部门范围** | 以部门为维度选定的考试对象，选择某部门即包含该部门下（可选含下级部门）的全体人员。 |\n| **组织内全部人员** | 考试对象覆盖当前租户范围内的全部人员，无需单独选择。 |\n| **仅部分人员** | 考试对象仅为管理员选择的具体人员或部门范围内的人员。 |\n| **免考人员** | 被排除在考试要求之外的人员或部门，不计入应考人数，不影响参与率和及格率计算。 |\n| **人员快照** | 创建考试或编辑保存时对当时考试对象范围内所有人员的完整记录（含 ID、姓名、所属公司、部门、人员状态），用于发布前人员变更校验。 |\n| **人员状态** | 枚举值：在职（启用）、离职、停用（禁用）。 |\n| **草稿** | 考试创建后尚未发布的初始状态，支持编辑和发布。 |\n| **未开始** | 考试发布后但尚未到达考试开始时间的状态。 |\n| **进行中** | 考试正处于考试时间段内的状态。 |\n| **已结束** | 考试时间已过的状态。 |\n| **上级下发考试** | 由集团或上级单位创建并推送给下级单位的考试，下级单位不可编辑、删除、发布。 |\n| **自建考试** | 当前租户管理员自行创建的考试。 |\n| **公司汇总** | 集团独有的统计视图，以公司为粒度对部门数据进行扁平汇总展示。 |\n| **部门明细** | 以部门树结构展示统计数据的视图。 |\n\n---\n\n## 5. 核心业务流程图\n\n### 5.1 考试全生命周期（通用）\n\n```mermaid\nflowchart TD\n    A[创建考试] --> B[填写基本信息]\n    B --> C[选择考生范围]\n    C --> C1{考试对象模式?}\n    C1 -->|仅部分人员| C2[选择人员/部门 + 配置免考]\n    C1 -->|组织内全部人员| C3[跳过选人]\n    C2 --> D[设置考试参数]\n    C3 --> D\n    D --> E[生成人员快照]\n    E --> F{保存为草稿}\n    F --> G[草稿状态]\n    G --> H{管理员操作?}\n    H -->|编辑| I[编辑考生范围 → 覆盖快照]\n    I --> G\n    H -->|发布| J[执行发布前人员变更校验]\n    J --> K{有人员变更?}\n    K -->|否| L[直接发布]\n    K -->|是| M[展示发布弹窗]\n    M --> N{管理员确认?}\n    N -->|取消| G\n    N -->|确认发布| L\n    L --> O[未开始]\n    O --> P[进行中]\n    P --> Q[已结束]\n    G -->|删除| R[考试删除]\n```\n\n### 5.2 下级单位特殊流程：上级下发考试\n\n```mermaid\nflowchart TD\n    G[集团管理员] -->|创建并下发| S[上级下发考试]\n    S -->|出现在| SU[下级单位考试列表]\n    SU --> SU1{下级单位操作}\n    SU1 -->|点击名称| SU2[查看集团版考试详情]\n    SU1 -->|管理| SU3[进入本单位统计页]\n    SU1 -->|编辑/删除/发布/复制| SU4[❌ 不可操作]\n```\n\n### 5.3 发布前人员变更校验流程\n\n```mermaid\nflowchart TD\n    A[管理员点击发布] --> B[系统获取人员快照]\n    B --> C[获取当前人员主数据]\n    C --> D{比对快照与主数据}\n    D --> E1[已选人员离职/停用 → 移除]\n    D --> E2[部门内人员离职/停用/转出 → 移除]\n    D --> E3[部门内人员转入/启用 → 新增]\n    E1 --> F{总计变更 > 0 ?}\n    E2 --> F\n    E3 --> F\n    F -->|否| G[直接发布，状态变更为未开始]\n    F -->|是| H[展示发布弹窗]\n    H --> I[按分类查看：全部 / 移除 / 新增]\n    I --> J{管理员操作?}\n    J -->|点击发布| G\n    J -->|点击取消 / 关闭 / 遮罩| K[保持草稿，不发布]\n```\n\n---\n\n## 6. 用例图\n\n```mermaid\nflowchart LR\n    subgraph Actors\n        GA[集团管理员]\n        SA[下级单位管理员]\n        NA[普通租户管理员]\n        SYS[系统]\n    end\n\n    subgraph UC[考试功能用例]\n        direction TB\n        UC1((创建考试))\n        UC2((编辑考试))\n        UC3((发布考试))\n        UC4((查看考试列表))\n        UC5((考试统计))\n        UC6((人员选择))\n        UC7((免考配置))\n        UC8((接收上级考试))\n        UC9((发布前校验))\n        UC10((快照管理))\n    end\n\n    GA --> UC1\n    GA --> UC2\n    GA --> UC3\n    GA --> UC4\n    GA --> UC5\n    GA --> UC6\n    GA --> UC7\n    SA --> UC1\n    SA --> UC2\n    SA --> UC3\n    SA --> UC4\n    SA --> UC5\n    SA --> UC6\n    SA --> UC7\n    SA --> UC8\n    NA --> UC1\n    NA --> UC2\n    NA --> UC3\n    NA --> UC4\n    NA --> UC5\n    NA --> UC6\n    NA --> UC7\n    SYS --> UC9\n    SYS --> UC10\n```\n\n---\n\n## 7. 数据模型\n\n### 7.1 核心实体关系图\n\n```mermaid\nerDiagram\n    租户 ||--o{ 考试 : \"拥有\"\n    考试 ||--o{ 人员快照 : \"生成\"\n    考试 ||--o{ 考试记录 : \"产生\"\n    考试 ||--o{ 免考配置 : \"配置\"\n    考试 }o--|| 租户 : \"归属\"\n    考试 }o--|| 考试分类 : \"分类\"\n\n    租户 {\n        string 租户ID PK\n        string 租户名称\n        string 租户类型 \"集团 / 下级单位 / 普通租户\"\n        string 上级租户ID FK \"下级单位时有值\"\n        string 所属公司名称 \"集团/下级单位\"\n    }\n\n    考试 {\n        string 考试ID PK\n        string 所属租户ID FK\n        string 考试名称\n        string 分类ID FK\n        string 来源 \"自建 / 上级下发\"\n        string 状态 \"草稿 / 未开始 / 进行中 / 已结束\"\n        string 范围模式 \"仅部分人员 / 组织内全部人员\"\n        datetime 考试开始时间\n        datetime 考试结束时间\n        datetime 快照生成时间\n        datetime 创建时间\n        datetime 更新时间\n    }\n\n    人员快照 {\n        string 快照ID PK\n        string 考试ID FK\n        string 人员ID\n        string 姓名\n        string 所属公司 \"集团有值，下级单位/普通租户无\"\n        string 部门名称\n        string 部门全路径\n        string 人员状态 \"在职 / 离职 / 停用\"\n        datetime 快照时间\n        string 快照版本 \"创建 / 编辑\"\n    }\n\n    免考配置 {\n        string 免考配置ID PK\n        string 考试ID FK\n        string 免考类型 \"人员 / 部门\"\n        string 免考目标ID\n        string 免考目标名称\n    }\n\n    考试记录 {\n        string 考试记录ID PK\n        string 考试ID FK\n        string 考生ID\n        string 考生姓名\n        string 所属公司\n        string 部门名称\n        string 完成状态 \"已完成 / 未完成\"\n        int 分数\n        bool 是否及格\n        datetime 交卷时间\n    }\n\n    考试分类 {\n        string 分类ID PK\n        string 租户ID FK\n        string 分类名称\n        string 上级分类ID\n        string 来源 \"自建 / 上级下发（下级单位有上级下发分类节点）\"\n    }\n```\n\n### 7.2 关键字段说明\n\n#### 考试来源\n\n| 值 | 含义 | 适用租户 |\n|----|------|---------|\n| 自建 | 当前租户自建考试 | 全部 |\n| 上级下发 | 上级下发考试 | 下级单位 |\n\n#### 考试状态流转\n\n```\n草稿 → 未开始 → 进行中 → 已结束\n  │\n  └── (删除)\n```\n\n#### 人员快照版本\n\n| 值 | 生成时机 | 说明 |\n|----|---------|------|\n| 创建 | 创建考试保存时 | 考试首次创建时生成 |\n| 编辑 | 编辑考试保存时 | 覆盖旧快照，作为发布校验的最新基准 |\n\n---\n\n## 8. 非功能性需求\n\n### 8.1 性能要求\n\n| 指标 | 要求 |\n|------|------|\n| 考试列表查询响应 | ≤ 2s（1000 条以内） |\n| 人员选择器加载 | ≤ 3s（10,000 以内人员数据） |\n| 部门人数重新计算 | ≤ 3s |\n| 发布前人员变更校验 | ≤ 5s（包含三分类校验） |\n| 考试统计查询 | ≤ 3s |\n| 并发支持 | 支持 100+ 管理员同时操作 |\n\n### 8.2 安全性\n\n| 要求 | 说明 |\n|------|------|\n| 数据隔离 | 不同租户数据严格隔离，下级单位不可访问集团或平级单位数据 |\n| 操作权限 | 上级下发考试在下级单位侧仅开放\"管理\"操作，编辑/删除/发布等操作需校验考试来源为自建 |\n| 人员选择范围限制 | 下级单位人员选择器限定本单位及下属部门，不可越权访问平级或上级单位人员 |\n| 快照安全 | 人员快照为只读历史数据，持久化后不可篡改 |\n\n### 8.3 兼容性\n\n| 要求 | 说明 |\n|------|------|\n| 浏览器 | Chrome 90+、Edge 90+、Safari 14+ |\n| 分辨率 | 1366×768 及以上 |\n\n### 8.4 可维护性\n\n| 要求 | 说明 |\n|------|------|\n| 操作日志 | 考试创建、编辑、发布、删除需记录操作日志 |\n| 快照审计 | 快照生成和覆盖保留历史记录，发布校验时可回溯 |\n\n---\n\n## 9. 页面清单与关联 PRD\n\n### 9.1 集团（上级单位）\n\n| 序号 | 页面名称 | 页面 PRD 路径 | 原型文件 |\n|------|---------|--------------|---------|\n| 1 | 考试列表-集团 | `prd/考试列表-集团.md` | `考试列表-集团.html` |\n| 2 | 新增考试-集团 | `prd/新增考试-集团.md` | `新增考试-集团.html` |\n| 3 | 编辑考试-集团 | `prd/编辑考试-集团.md` | `编辑考试-集团.html` |\n| 4 | 考试统计-集团 | `prd/考试统计-集团.md` | `考试统计-集团.html` |\n| 5 | 人员选择-集团 | — | `人员选择-集团.html` |\n\n### 9.2 下级单位\n\n| 序号 | 页面名称 | 页面 PRD 路径 | 原型文件 |\n|------|---------|--------------|---------|\n| 1 | 考试列表-下级单位 | `prd/考试列表-下级单位.md` | `考试列表-下级单位.html` |\n| 2 | 新增考试-下级单位 | `prd/新增考试-下级单位.md` | `新增考试-下级单位.html` |\n| 3 | 编辑考试-下级单位 | `prd/编辑考试-下级单位.md` | `编辑考试-下级单位:独立租户.html` |\n| 4 | 考试统计-下级单位 | `prd/考试统计-下级单位.md` | `考试统计-下级单位:独立租户.html` |\n| 5 | 人员选择-下级单位：本单位 | — | `人员选择-下级单位:本单位.html` |\n| 6 | 人员选择-下级单位 | — | `人员选择-下级单位.html` |\n\n### 9.3 独立租户/普通租户\n\n| 序号 | 页面名称 | 页面 PRD 路径 | 原型文件 |\n|------|---------|--------------|---------|\n| 1 | 考试列表 | `prd/考试列表-普通租户.md` | `考试列表-普通租户.html` |\n| 2 | 新增考试 | —（参考集团/下级新增） | `新增考试-普通租户.html` |\n| 3 | 编辑考试 | —（参考下级编辑，同数据范围） | `编辑考试-下级单位:独立租户.html` |\n| 4 | 考试统计 | —（参考下级统计） | `考试统计-普通租户.html` |\n\n### 9.4 通用页面\n\n| 序号 | 页面名称 | 说明 | 原型文件 |\n|------|---------|------|---------|\n| 1 | 规则说明 | 考试功能入口的规则说明页 | `规则说明.html` |\n\n### 9.5 小程序\n\n| 序号 | 页面名称 | 说明 | 原型文件 |\n|------|---------|------|---------|\n| 1 | 考试列表 | 小程序端考试列表 | `小程序考试列表.html` |\n\n---\n\n## 10. 附录\n\n### 10.1 租户数据范围矩阵\n\n```\n┌────────────────┬──────────────────────┬──────────────────────┬──────────────────┐\n│   能力 \\ 租户   │        集团           │       下级单位         │    独立租户        │\n├────────────────┼──────────────────────┼──────────────────────┼──────────────────┤\n│ 创建考试        │ 集团跨公司            │ 本单位+下属部门        │ 本租户            │\n│ 上级下发考试     │ 不涉及（集团不下发自己） │ ✅ 列表展示+接收       │ ❌ 不涉及          │\n│ 跨公司选人       │ ✅                    │ ❌                    │ ❌ 无公司概念       │\n│ 人员按公司分组    │ ✅                    │ ❌ 平铺标签            │ ❌ 平铺标签        │\n│ 列表含所属公司列  │ ✅ 考生分析/考试记录    │ ❌                    │ ❌                │\n│ 部门筛选          │ 公司+部门级联          │ 部门下拉树            │ 部门下拉树         │\n│ 统计视图          │ 部门明细 + 公司汇总     │ 部门明细              │ 部门明细           │\n│ 人员选择器        │ 人员选择-集团          │ 人员选择-下级单位       │ 人员选择-下级单位    │\n│ 快照含公司字段    │ ✅                    │ ❌                    │ ❌                │\n│ 分类树上级下发节点 │ ❌                    │ ✅                    │ ❌                │\n└────────────────┴──────────────────────┴──────────────────────┴──────────────────┘\n```\n\n### 10.2 页面状态流转\n\n| 当前状态 | 触发操作 | 目标状态 | 前置条件 |\n|----------|---------|---------|----------|\n| — | 创建考试（保存草稿） | 草稿 | 基本信息填写完成 + 考生范围选择（部分人员模式下至少 1 人或 1 部门） |\n| 草稿 | 编辑保存 | 草稿 | 编辑后覆盖人员快照 |\n| 草稿 | 发布（无变更） | 未开始 | 无人员变更 |\n| 草稿 | 发布（有变更→确认） | 未开始 | 管理员在发布弹窗确认 |\n| 草稿 | 删除 | — | — |\n| 未开始 | 到达开始时间 | 进行中 | 系统自动 |\n| 进行中 | 到达结束时间 | 已结束 | 系统自动 |\n\n### 10.3 版本变更记录\n\n| 版本 | 日期 | 变更内容 | 作者 |\n|------|------|----------|------|\n| V1.0 | 2026-07-13 | 初版。统一定义集团/下级单位/独立租户三种形态下考试功能的全局业务规则、数据模型、角色权限、核心流程和页面清单。 | — |\n\n### 10.4 引用标准\n\n- 本 PRD 作为\"总分结构\"中的总纲，各页面详细交互/UI 规格参见对应的页面 PRD。\n- 所有页面 PRD 的编号均以本 PRD 中第 9 节的页面清单为索引。\n- 三种租户的独特规则已在各差异对照表和矩阵中明确标注。\n",

    },
    {
      "id": "2",
      "title": "选择考试对象",
      "anchor": {
        "selector": ".btn-select-standalone"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.2.1 打开入口与选择范围</strong></p><table class=\"prd-readable-table\"><thead><tr><th>项目</th><th>规则</th></tr></thead><tbody><tr><td>触发动作</td><td>点击考生范围中的\"选择\"按钮。</td></tr><tr><td>打开页面</td><td>打开人员选择器，用于选择本次考试对象。</td></tr><tr><td>选择范围</td><td>仅支持在当前租户范围内选择人员和部门。</td></tr><tr><td>查看已选</td><td>指定用户、部门范围均支持进入查看已选，用于核对和维护已选结果。</td></tr><tr><td>确认返回</td><td>确认后将当前已选人员、部门和系统解析出的人员范围返回新增考试页面。</td></tr></tbody></table></div>"
    },
    {
      "id": "3",
      "title": "指定用户",
      "anchor": {
        "selector": "#specifiedUserSection"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.3 已选人员和部门回显</strong></p><table class=\"prd-readable-table\"><thead><tr><th>展示对象</th><th>展示规则</th></tr></thead><tbody><tr><td>已选人员</td><td>展示在指定用户区域，以姓名标签平铺展示，不按公司分组。</td></tr><tr><td>标签内容</td><td>标签上显示姓名，hover 可查看完整部门路径。</td></tr><tr><td>单个移除</td><td>支持移除单个人员，其他标签保持不动。</td></tr><tr><td>全部移除</td><td>支持清空当前已选人员和部门范围。</td></tr><tr><td>可见性</td><td>未选择人员时隐藏整个指定用户区域。</td></tr><tr><td>超量展示</td><td>已选人员超过 10 条时，页面最多展示前 10 条标签，并显示「查看更多 X 项」，X = 已选人员总数 - 10。</td></tr><tr><td>查看更多</td><td>点击「查看更多 X 项」时，等同于点击当前区域的「查看已选」按钮，打开已选人员视图，用于查看和维护完整已选人员。</td></tr></tbody></table></div>"
    },
    {
      "id": "4",
      "title": "部门范围",
      "anchor": {
        "selector": "#deptRangeSection"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.3 已选人员和部门回显</strong></p><table class=\"prd-readable-table\"><thead><tr><th>展示对象</th><th>展示规则</th></tr></thead><tbody><tr><td>已选部门</td><td>展示在部门范围区域，以部门名称标签平铺展示。</td></tr><tr><td>部门标签</td><td>仅展示部门名称，不展示公司名。</td></tr><tr><td>单个移除</td><td>支持移除单个部门，并同步刷新数量。</td></tr><tr><td>全部移除</td><td>支持清空当前已选部门范围。</td></tr><tr><td>可见性</td><td>未选择部门时隐藏整个部门范围区域。</td></tr><tr><td>超量展示</td><td>已选部门超过 10 条时，页面最多展示前 10 条标签，并显示「查看更多 X 项」，X = 已选部门总数 - 10。</td></tr><tr><td>查看更多</td><td>点击「查看更多 X 项」时，等同于点击当前区域的「查看已选」按钮，打开已选部门视图，用于查看和维护完整已选部门。</td></tr></tbody></table></div>"
    },
    {
      "id": "5",
      "title": "免考人员",
      "anchor": {
        "selector": "#exemptSection"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.4 免考人员配置</strong></p><table class=\"prd-readable-table\"><thead><tr><th>项目</th><th>规则</th></tr></thead><tbody><tr><td>配置入口</td><td>点击免考人员区域的\"选择\"按钮打开人员选择器。</td></tr><tr><td>免考对象</td><td>支持选择免考人员和免考部门范围。</td></tr><tr><td>结果回显</td><td>展示已选免考人员数量、免考部门数量，已选结果以标签形式平铺展示。</td></tr><tr><td>查看已选</td><td>存在免考对象时，支持查看已选免考人员或免考部门。</td></tr><tr><td>业务口径</td><td>免考范围随考试对象一并保存，用于后续应考人数和考试流程口径计算。</td></tr><tr><td>超量展示</td><td>免考已选人员或免考已选部门超过 10 条时，页面最多展示前 10 条标签，并显示「查看更多 X 项」，X = 当前免考已选总条数 - 10。</td></tr><tr><td>查看更多</td><td>点击「查看更多 X 项」时，等同于点击免考区域的「查看已选」按钮，打开对应已选视图，用于查看和维护完整免考范围。</td></tr></tbody></table></div>"
    },
    {
      "id": "6",
      "title": "保存并下一步",
      "anchor": {
        "selector": ".form-footer .btn-primary"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.5 人员快照生成、5.3 保存与快照、5.4 页面跳转</strong></p><table class=\"prd-readable-table\"><thead><tr><th>规则项</th><th>说明</th></tr></thead><tbody><tr><td>保存校验</td><td>保存前需校验至少选择一名用户或一个部门。</td></tr><tr><td>创建草稿</td><td>创建考试草稿时，系统基于当前考试对象生成创建考试时人员快照。</td></tr><tr><td>快照内容</td><td>保留人员 ID、姓名、部门、人员状态等信息，不含所属公司。</td></tr><tr><td>发布校验</td><td>后续草稿发布前以创建或最近一次编辑后的人员快照为基准进行变更校验。</td></tr><tr><td>后续行为</td><td>点击保存并下一步进入考试设置步骤。</td></tr></tbody></table></div>"
    },
    {
      "id": "7",
      "title": "考生范围人员统计",
      "anchor": {
        "selector": "#specifiedCount"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.3 已选人员和部门回显</strong></p><table class=\"prd-readable-table\"><thead><tr><th>统计项</th><th>规则</th></tr></thead><tbody><tr><td>指定用户数量</td><td>指定用户区域标题旁展示人员数量。</td></tr><tr><td>部门数量</td><td>部门范围区域标题旁展示部门数量。</td></tr><tr><td>刷新时机</td><td>选择返回、单个移除、全部移除后同步刷新数量和页面回显。</td></tr></tbody></table></div>"
    },
    {
      "id": "8",
      "title": "免考人员统计",
      "anchor": {
        "selector": "#exemptCount"
      },
      "content": "<div class=\"prd-content-wide\"><p><strong>对应 PRD：4.4 免考人员配置</strong></p><table class=\"prd-readable-table\"><thead><tr><th>统计项</th><th>规则</th></tr></thead><tbody><tr><td>免考人数</td><td>页面展示已选免考人员数量。</td></tr><tr><td>免考部门</td><td>页面展示已选免考部门数量。</td></tr><tr><td>同步刷新</td><td>选择、查看已选、单个移除和全部移除后同步刷新免考统计。</td></tr></tbody></table></div>"
    }
  ]
}
</script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- 批量导入弹窗 -->
  <div class="batch-import-modal" id="batchImportModal" role="dialog" aria-modal="true">
    <div class="modal-dialog">
      <div class="modal-header">
        <div class="modal-title">导入</div>
        <button class="modal-close" type="button" onclick="closeBatchImportModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-title">下载模板，填写信息</div>
        </div>
        <div class="step-content">
          <div class="template-card">
            <div class="template-icon">M</div>
            <div class="template-info">按照下载的模板，完成信息填写</div>
            <button class="btn-template" type="button" onclick="downloadBatchTemplate()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下载模板
            </button>
          </div>
        </div>

        <div class="step">
          <div class="step-num active">2</div>
          <div class="step-title">
            上传填好文件
            <span class="batch-import-tooltip" title="支持 .xls、.xlsx 格式，单次最多 1000 行，姓名与手机号均为必填">?</span>
          </div>
        </div>
        <div class="step-content" style="margin-bottom:0;">
          <label class="upload-area" id="batchImportUploadArea" for="batchImportFile">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div class="upload-text" id="batchImportUploadText">
              将文件拖到此处，或 <a href="javascript:void(0)">点击上传</a><br>
              最大支持5M、仅xls、xlsx的文件
            </div>
            <input type="file" id="batchImportFile" accept=".xls,.xlsx" onchange="handleBatchImportFileSelect(this)">
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-footer btn-footer-cancel" type="button" onclick="closeBatchImportModal()">返回</button>
        <button class="btn-footer btn-footer-primary" type="button" id="batchImportSubmit" onclick="submitBatchImport()" disabled>导入</button>
      </div>
    </div>
  </div>

  <script src="prd-annotation.js"></script>

</body>
</html>
